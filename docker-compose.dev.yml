version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: dev-postgres
    healthcheck:
      # 컨테이너 내부엔 DB_USER가 아니라 POSTGRES_USER가 주입된다($${...}=컨테이너 런타임 평가).
      # 기존 $${DB_USER}는 빈 값이라 pg_isready -U 인자 누락 → 항상 unhealthy가 되던 버그 수정.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 5
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          # 기본 config(shared_buffers 128M)로 실사용은 수백 MB 수준 → 상한을 낮춰
          # nginx 추가분과 러너 구동 여유를 확보(container_memory.md).
          memory: 768M
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dev-kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'INTERNAL://kafka:9092,CONTROLLER://kafka:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_HEAP_OPTS: "-Xms350M -Xmx500M"
    deploy:
      resources:
        limits:
          memory: 700M
    restart: always

  redis:
    image: redis:7-alpine
    container_name: dev-redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          # 리프레시 토큰 저장 + 경량 캐시 용도라 1000M는 과할당 → 256M로 축소
          # (nginx 추가분/러너 여유 확보, container_memory.md).
          memory: 256M
    restart: always

  # 외부 공개 진입점(80)은 더 이상 이 compose가 관리하지 않는다 — FE 레포의
  # 자체 self-hosted 러너(ec2-fe)가 GHCR 이미지를 pull해 `docker run --network openat`으로
  # 직접 띄운다(openat-nginx). 이 compose가 같은 호스트 포트(80)를 같이 잡으면
  # 충돌하므로 nginx 서비스는 제거하고, apigateway만 `openat` 외부 네트워크에도
  # 연결해 openat-nginx가 "apigateway" 별칭으로 찾을 수 있게 한다(2026-07-08).
  # DB/Kafka 연결이 없는 순수 WebFlux 라우팅·필터링 게이트웨이라
  # JPA+Web+Kafka를 다 갖는 다른 도메인 서비스보다 메모리를 훨씬 적게 잡는다.
  apigateway:
    image: ghcr.io/${GITHUB_REPOSITORY}/apigateway:latest
    container_name: dev-apigateway
    ports:
      - "8000:8000"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
      SPRING_PROFILES_ACTIVE: compose
    depends_on:
      - member
    networks:
      default: {}
      openat:
        aliases:
          - apigateway
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always

  member:
    image: ghcr.io/${GITHUB_REPOSITORY}/member:latest
    container_name: dev-member
    ports:
      - "9100:9100"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms300m -Xmx400m"
      SPRING_PROFILES_ACTIVE: compose
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # member는 ddl-auto=validate인데 Flyway/schema.sql이 없어 신규 DB에서 테이블 생성
      # 수단이 없다 → 콜드부팅 시 'missing table' 크래시. product/order와 동일하게 update로
      # override해 최초 기동 시 테이블 자동생성(팀 검토 후 정식 마이그레이션 도입 권장).
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # member는 Redis(리프레시 토큰) + JWT(RSA) 설정을 요구하는데 배선이 누락돼 있었다
      # (application-compose.yml의 ${REDIS_*}/${JWT_*} 미해결 크래시). 값은 ENV_SECRETS에서 주입.
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JWT_KEY_ID: ${JWT_KEY_ID}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 600M
    restart: always

  product:
    image: ghcr.io/${GITHUB_REPOSITORY}/product:latest
    container_name: dev-product
    ports:
      - "9110:9110"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms400m -Xmx500m"
      SPRING_PROFILES_ACTIVE: compose
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BROKER: ${KAFKA_BROKER}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 700M
    restart: always

  order:
    image: ghcr.io/${GITHUB_REPOSITORY}/order:latest
    container_name: dev-order
    ports:
      - "9120:9120"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms400m -Xmx500m"
      SPRING_PROFILES_ACTIVE: compose
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BROKER: ${KAFKA_BROKER}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 700M
    restart: always

  payment:
    image: ghcr.io/${GITHUB_REPOSITORY}/payment:latest
    container_name: dev-payment
    ports:
      - "9130:9130"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms400m -Xmx500m"
      SPRING_PROFILES_ACTIVE: compose
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BROKER: ${KAFKA_BROKER}
      PG_CLIENT_KEY: ${PG_CLIENT_KEY}
      PG_SECRET_KEY: ${PG_SECRET_KEY}
      PAYMENT_FIELD_ENCRYPTION_KEY: ${PAYMENT_FIELD_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 700M
    restart: always

  settlement:
    image: ghcr.io/${GITHUB_REPOSITORY}/settlement:latest
    container_name: dev-settlement
    ports:
      - "9140:9140"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms300m -Xmx400m"
      SPRING_PROFILES_ACTIVE: compose
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # settlement은 kafka 컨슈머/프로듀서를 쓰는데 KAFKA_BROKER 배선이 누락돼
      # 기동 시 placeholder 미해결로 크래시하던 것을 수정.
      KAFKA_BROKER: ${KAFKA_BROKER}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 600M
    restart: always

volumes:
  pgdata_dev:

networks:
  default:
  # FE 레포 배포 파이프라인이 `docker network create openat`으로 미리 만들어 둔
  # 호스트 공용 네트워크 — openat-nginx가 apigateway를 찾는 통로(2026-07-08).
  openat:
    external: true
