version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: dev-postgres
    healthcheck:
      # 컨테이너 내부엔 DB_USER가 아니라 POSTGRES_USER가 주입된다($${...}=컨테이너 런타임 평가).
      # 기존 $${DB_USER}는 빈 값이라 pg_isready -U 인자 누락 → 항상 unhealthy가 되던 버그 수정.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 5
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          # 기본 config(shared_buffers 128M)로 실사용은 수백 MB 수준 → 상한을 낮춰
          # nginx 추가분과 러너 구동 여유를 확보(container_memory.md).
          memory: 768M
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dev-kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'INTERNAL://kafka:9092,CONTROLLER://kafka:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_HEAP_OPTS: "-Xms350M -Xmx500M"
    deploy:
      resources:
        limits:
          memory: 700M
    restart: always

  redis:
    image: redis:7-alpine
    container_name: dev-redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          # 리프레시 토큰 저장 + 경량 캐시 용도라 1000M는 과할당 → 256M로 축소
          # (nginx 추가분/러너 여유 확보, container_memory.md).
          memory: 256M
    restart: always

  # 외부 공개 진입점(80). FE 정적(dist)을 서빙하고 /api·/auth·/v3/api-docs 등
  # 백엔드 경로는 apigateway로 리버스 프록시한다. SG가 80/443만 열기 때문에
  # 실질적인 게이트웨이 앞단. 이미지는 FE 레포 CI가 GHCR로 push(멀티스테이지:
  # vite build → nginx). 로컬 정적 서빙은 docker run 스모크 테스트로 검증(deployplan.md).
  nginx:
    image: ${FRONTEND_IMAGE:-ghcr.io/prgrms-be-adv-devcourse/beadv6_6_lets-gpt_fe/frontend:latest}
    container_name: dev-nginx
    ports:
      - "80:80"
    depends_on:
      - apigateway
    deploy:
      resources:
        limits:
          memory: 128M
    restart: always

  # DB/Kafka 연결이 없는 순수 WebFlux 라우팅·필터링 게이트웨이라
  # JPA+Web+Kafka를 다 갖는 다른 도메인 서비스보다 메모리를 훨씬 적게 잡는다.
  apigateway:
    image: ghcr.io/${GITHUB_REPOSITORY}/apigateway:latest
    container_name: dev-apigateway
    ports:
      - "8000:8000"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
      SPRING_PROFILES_ACTIVE: compose
    depends_on:
      - member
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always

  member:
    image: ghcr.io/${GITHUB_REPOSITORY}/member:latest
    container_name: dev-member
    ports:
      - "9100:9100"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms300m -Xmx400m"
      SPRING_PROFILES_ACTIVE: compose
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # member는 ddl-auto=validate인데 Flyway/schema.sql이 없어 신규 DB에서 테이블 생성
      # 수단이 없다 → 콜드부팅 시 'missing table' 크래시. product/order와 동일하게 update로
      # override해 최초 기동 시 테이블 자동생성(팀 검토 후 정식 마이그레이션 도입 권장).
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 600M
    restart: always

  product:
    image: ghcr.io/${GITHUB_REPOSITORY}/product:latest
    container_name: dev-product
    ports:
      - "9110:9110"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms400m -Xmx500m"
      SPRING_PROFILES_ACTIVE: compose
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BROKER: ${KAFKA_BROKER}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 700M
    restart: always

  order:
    image: ghcr.io/${GITHUB_REPOSITORY}/order:latest
    container_name: dev-order
    ports:
      - "9120:9120"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms400m -Xmx500m"
      SPRING_PROFILES_ACTIVE: compose
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BROKER: ${KAFKA_BROKER}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 700M
    restart: always

  payment:
    image: ghcr.io/${GITHUB_REPOSITORY}/payment:latest
    container_name: dev-payment
    ports:
      - "9130:9130"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms400m -Xmx500m"
      SPRING_PROFILES_ACTIVE: compose
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BROKER: ${KAFKA_BROKER}
      PG_CLIENT_KEY: ${PG_CLIENT_KEY}
      PG_SECRET_KEY: ${PG_SECRET_KEY}
      PAYMENT_FIELD_ENCRYPTION_KEY: ${PAYMENT_FIELD_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 700M
    restart: always

  settlement:
    image: ghcr.io/${GITHUB_REPOSITORY}/settlement:latest
    container_name: dev-settlement
    ports:
      - "9140:9140"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms300m -Xmx400m"
      SPRING_PROFILES_ACTIVE: compose
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # settlement은 kafka 컨슈머/프로듀서를 쓰는데 KAFKA_BROKER 배선이 누락돼
      # 기동 시 placeholder 미해결로 크래시하던 것을 수정.
      KAFKA_BROKER: ${KAFKA_BROKER}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 600M
    restart: always

volumes:
  pgdata_dev:
