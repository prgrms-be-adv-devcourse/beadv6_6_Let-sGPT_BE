spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/openat     # Compose 서비스명
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  kafka:
    bootstrap-servers: kafka:9092
  data:
    redis:
      host: redis
      port: 6379

services:
  member:
    url: http://member:9100                         # Compose DNS
  product:
    url: http://product:9110
  payment:
    url: http://payment:9130
  settlement:
    url: http://settlement:9140
