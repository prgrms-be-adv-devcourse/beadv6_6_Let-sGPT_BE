server:
  port: 9120


spring:
  kafka:
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
  profiles:
    active: local
  application:
    name: order-service
  jpa:
    properties:
      hibernate:
        default_schema: orders # 스키마 분리
    hibernate:
      ddl-auto: update
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

order:
  kafka:
    topic:
      payment-complete: payment.completed.events
      payment-failed: payment.failed.events
      refund-completed: refund.completed.events
      refund-failed: refund.failed.events
      order-completed: order.completed.events
      stock-adjusted: order.stock.adjusted.events


# k8s readiness/liveness probe + Prometheus 메트릭 노출 (전 프로필 공통)
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true   # k8s 밖(local/compose)에서도 /actuator/health/readiness·liveness 활성화
  tracing:
    export:
      otlp:
        enabled: false   # 로컬/compose 기본 off — Tempo 없으면 export 실패가 반복 로깅됨(k8s ConfigMap에서 true로 override)
