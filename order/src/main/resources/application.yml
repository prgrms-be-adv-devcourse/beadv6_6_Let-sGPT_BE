server:
  port: 9120
  tomcat:
    mbeanregistry:
      enabled: true   # tomcat_threads_* 메트릭(Micrometer TomcatMetrics) 노출에 필요


spring:
  kafka:
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
  profiles:
    active: local
  application:
    name: order-service
  jpa:
    properties:
      hibernate:
        default_schema: orders # 스키마 분리
    hibernate:
      ddl-auto: validate
  flyway:
    schemas: orders # flyway_schema_history도 orders 스키마 안에 생성
    locations: classpath:db/migration
    baseline-on-migrate: true # 기존 ddl-auto로 이미 떠 있는 스키마는 V1을 재실행하지 않고 자동으로 베이스라인 처리
    baseline-version: 1
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

order:
  kafka:
    topic:
      payment-complete: payment.completed.events
      payment-failed: payment.failed.events
      refund-completed: refund.completed.events
      refund-failed: refund.failed.events
      order-completed: order.completed.events
      stock-adjusted: order.stock.adjusted.events


# k8s readiness/liveness probe + Prometheus 메트릭 노출 (전 프로필 공통)
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true   # k8s 밖(local/compose)에서도 /actuator/health/readiness·liveness 활성화
  metrics:
    distribution:
      # 지연 퍼센타일·SLO 준수율 계산용 누적 버킷. 대상은 HTTP 서버 타이머 하나로 한정.
      percentiles-histogram:
        "[http.server.requests]": true
      # 버킷 51개로 클램프(무클램프 69개). 하한은 빠른 엔드포인트 해상도, 상한은 재고 차감 read 여유.
      minimum-expected-value:
        "[http.server.requests]": 5ms
      maximum-expected-value:
        "[http.server.requests]": 10s
  tracing:
    export:
      otlp:
        enabled: false   # 로컬/compose 기본 off — Tempo 없으면 export 실패가 반복 로깅됨(k8s ConfigMap에서 true로 override)
