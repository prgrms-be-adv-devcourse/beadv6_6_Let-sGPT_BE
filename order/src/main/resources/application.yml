server:
  port: 9120


spring:
  profiles:
    active: local
  application:
    name: order-service
  jpa:
    properties:
      hibernate:
        default_schema: order # 스키마 분리
    hibernate:
      ddl-auto: validate
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method