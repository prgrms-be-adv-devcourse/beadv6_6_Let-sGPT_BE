# 영속성 불필요(리프레시 토큰은 TTL 있음) → PVC 없는 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: openat
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            tcpSocket: { port: 6379 }
            periodSeconds: 5
          resources:
            limits: { memory: "256Mi" }
            requests: { cpu: "50m" }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: openat
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
