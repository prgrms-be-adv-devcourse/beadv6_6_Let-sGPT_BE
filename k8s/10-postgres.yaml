# PVC는 k3s 내장 local-path provisioner 사용 — 파드가 뜬 노드(large)의 로컬 디스크에
# 바인딩되며, 한번 생성되면 그 노드에 영구 고정된다(k3s_2node_cluster_plan.md §10).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: openat
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports: [{ containerPort: 5432 }]
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: app-secrets, key: DB_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: app-secrets, key: DB_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { configMapKeyRef: { name: app-config, key: DB_NAME } }
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            periodSeconds: 5
            failureThreshold: 6
          resources:
            limits: { memory: "768Mi" }
            requests: { cpu: "100m" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
            - { name: db-init, mountPath: /docker-entrypoint-initdb.d }
      volumes:
        - name: db-init
          configMap: { name: db-init }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: openat
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
