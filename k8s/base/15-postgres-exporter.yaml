# PostgreSQL 서버 관측. exporter를 openat 네임스페이스에 둔다(redis-exporter와 동일 패턴).
# openat에 두면 postgres에 로컬로 붙으므로, postgres-ingress가 podSelector:{}만으로 openat
# 내부 접속만 5432로 열어도 스크레이프가 성립한다 — observability에서 postgres로 향하는
# cross-namespace 5432 구멍을 뚫지 않아도 된다.
# 노드는 semi(tier: hotpath)로 고정한다. observability 전용 노드인 final이 memory-pressure
# 상태라 tempo가 스케줄되지 못하고 있어, 가벼운 exporter를 semi로 offload해 final의 스케줄
# 여유를 확보한다. 네임스페이스와 노드는 직교하는 축이라 따로 고를 수 있다. exporter는 TCP로
# 통계만 pull하므로 postgres와 노드가 달라도 로컬리티 손해가 없다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: openat
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  selector:
    matchLabels: { app: postgres-exporter }
  template:
    metadata:
      labels: { app: postgres-exporter }
      annotations:
        # ServiceMonitor/PodMonitor CRD는 이 클러스터에 없다. otel-collector의
        # kubernetes-pods 잡이 이 세 어노테이션만 보고 수집한다. role: pod에 네임스페이스
        # 제한이 없어 openat 파드도 발견 대상이다.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector: { tier: hotpath }
      # 파드 하드닝 — 비루트 고정. postgres-exporter 이미지의 기본 USER는 비숫자 이름 nobody라
      # runAsNonRoot: true만 두면 kubelet이 비숫자 유저를 검증하지 못해 기동이 거부된다. 그래서
      # 이미지 기본과 일치하는 숫자 UID/GID 65534(nobody)를 명시한다(이미지 /etc/passwd 실측).
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.20.1
          # 컨테이너 하드닝 — 권한 상승 차단, 전 capability 제거, 루트 FS 읽기전용.
          # postgres-exporter는 DSN으로 접속해 통계만 읽고 디스크에 쓰지 않아 ro rootfs로 충분하다.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          ports: [{ containerPort: 9187 }]
          envFrom:
            - secretRef: { name: pg-exporter-secret }
          resources:
            # final limit 재분배 기준, live 9Mi 대비 여유 충분.
            limits: { memory: "48Mi" }
            requests: { cpu: "20m", memory: "32Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: openat
spec:
  selector: { app: postgres-exporter }
  ports: [{ port: 9187, targetPort: 9187 }]
