# 7-16-s3_presigned_oidc_plan §7-1 — S3 접근용 OIDC(AssumeRoleWithWebIdentity) 주체.
# 이 SA 이름이 terraform Role 신뢰정책의 sub 조건(system:serviceaccount:openat:product-sa, §3-3)과
# 정확히 일치해야 STS가 토큰을 받아준다 — 이름 변경 시 terraform도 함께 고칠 것.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-sa
  namespace: openat
---
# ★ S2: startup/readiness/liveness probe (actuator probes — replica>1 롤링 무유실의 전제)
# ★ S5: prometheus.io/* 어노테이션 (7/10 Prometheus 구축 시 재배포 없이 scrape 대상 편입)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
  namespace: openat
  annotations:
    # k3s_node_coldboot_contention_plan §2-C — 순차 롤아웃(wave 낮은 순)
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  # 단일 워커 노드: 롤링 시 옛+새 파드 2배 메모리로 Insufficient memory Pending(Q80 #7) 방지.
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  selector:
    matchLabels: { app: product }
  template:
    metadata:
      labels: { app: product }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9110"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      # 7-16-s3_presigned_oidc_plan §7-2/§7-4③ — SA ref + projected 토큰 + AWS env 3종이
      # 모두 있어야 SDK가 WebIdentity provider를 켠다(하나라도 빠지면 자격증명 자체가 안 잡힘).
      serviceAccountName: product-sa
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: product
          image: ghcr.io/prgrms-be-adv-devcourse/beadv6_6_let-sgpt_be/product:latest
          ports: [{ containerPort: 9110 }]
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          env:
            # k3s_memory_mitigation_plan.md §7-5(WS-M5) — 핫패스(G1 유지, limit 비례 65%).
            # Q113: 128m→256m 1차 상향(OutOfMemoryError: Metaspace 실측 대응) → Q116에서 서브리밋
            # 자체를 없애는 쪽으로 최종 결론, MaxMetaspaceSize 캡 완전 제거(pod limit 하나로 통제).
            - { name: JAVA_TOOL_OPTIONS, value: "-XX:MaxRAMPercentage=65.0 -XX:InitialRAMPercentage=25.0 -XX:ReservedCodeCacheSize=64m" }
            - { name: MALLOC_ARENA_MAX, value: "2" }
            - { name: SERVER_TOMCAT_THREADS_MAX, value: "50" }
            - { name: SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE, value: "3" }
            - { name: SPRING_DATASOURCE_HIKARI_CONNECTIONTIMEOUT, value: "5000" }
            # 7-16-s3_presigned_oidc_plan §7-2 — AWS OIDC 배선.
            # AWS_ROLE_ARN은 서비스마다 값이 달라 configmap에 못 넣는다(§7-3) → 여기 Deployment env.
            # 값 출처: terraform output -raw product_s3_role_arn (aws_iam_role.product_s3).
            - { name: AWS_ROLE_ARN, value: "arn:aws:iam::823315816237:role/letsGpt-openAt-product-s3" }
            - { name: AWS_WEB_IDENTITY_TOKEN_FILE, value: "/var/run/secrets/aws/token" }
            - { name: AWS_REGION, value: "ap-northeast-2" }
            - { name: AWS_STS_REGIONAL_ENDPOINTS, value: "regional" }
            # §5-3 어댑터 스위치. S3 어댑터는 아직 구현 전(현재 빈은 LocalImageStorageAdaptor 하나뿐,
            # 이 값을 읽는 코드가 없음)이라 지금은 무동작 — 어댑터가 들어오는 순간 S3로 전환된다.
            - { name: PRODUCT_IMAGE_STORAGE, value: "s3" }
          volumeMounts:
            - { name: aws-token, mountPath: /var/run/secrets/aws, readOnly: true }
          # 기동 완료까지 최대 300초 유예(2vCPU에서 6개 JVM 동시 부팅 + kubelet/kube 예약 감안, 실측 최악 251s) — 이후 liveness로 전환. k3s_node_coldboot_contention_plan §2-B/§2-A 동시 적용 전제
          startupProbe:
            httpGet: { path: /actuator/health/liveness, port: 9110 }
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 9110 }
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 9110 }
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            limits: { memory: "700Mi" }
            requests: { cpu: "100m", memory: "520Mi" }
      volumes:
        # 기본 SA 토큰(audience=k8s api)이 아니라 STS 전용 audience 토큰을 별도 발급받는다.
        - name: aws-token
          projected:
            sources:
              - serviceAccountToken: { audience: "sts.amazonaws.com", expirationSeconds: 3600, path: token }
---
apiVersion: v1
kind: Service
metadata:
  name: product
  namespace: openat
spec:
  selector: { app: product }
  ports: [{ port: 9110, targetPort: 9110 }]
