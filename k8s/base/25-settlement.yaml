# ★ S2: startup/readiness/liveness probe (actuator probes — replica>1 롤링 무유실의 전제)
# ★ S5: prometheus.io/* 어노테이션 (7/10 Prometheus 구축 시 재배포 없이 scrape 대상 편입)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement
  namespace: openat
spec:
  replicas: 1
  # 단일 워커 노드: 롤링 시 옛+새 파드 2배 메모리로 Insufficient memory Pending(Q80 #7) 방지.
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  selector:
    matchLabels: { app: settlement }
  template:
    metadata:
      labels: { app: settlement }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9140"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: settlement
          image: ghcr.io/prgrms-be-adv-devcourse/beadv6_6_let-sgpt_be/settlement:latest
          ports: [{ containerPort: 9140 }]
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: db-secrets }
          env:
            # k3s_memory_mitigation_plan.md §7-5(WS-M5) — 저트래픽(SerialGC, limit 비례 60%).
            # MaxMetaspaceSize 캡 제거(qna.md Q116) — 서브리밋 안 걸고 pod limit 하나로 통제.
            - { name: JAVA_TOOL_OPTIONS, value: "-XX:+UseSerialGC -XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=25.0 -XX:ReservedCodeCacheSize=64m" }
            - { name: MALLOC_ARENA_MAX, value: "2" }
            - { name: SERVER_TOMCAT_THREADS_MAX, value: "50" }
            - { name: SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE, value: "10" }
            - { name: SPRING_DATASOURCE_HIKARI_MINIMUMIDLE, value: "2" }
            - { name: SPRING_DATASOURCE_HIKARI_IDLETIMEOUT, value: "60000" }
            - { name: SPRING_DATASOURCE_HIKARI_CONNECTIONTIMEOUT, value: "5000" }
            - { name: SETTLEMENT_BATCH_GRIDSIZE, value: "2" }
          # 기동 완료까지 최대 300초 유예(2vCPU에서 6개 JVM 동시 부팅 + kubelet/kube 예약 감안, 실측 최악 251s) — 이후 liveness로 전환. k3s_node_coldboot_contention_plan §2-B/§2-A 동시 적용 전제
          startupProbe:
            httpGet: { path: /actuator/health/liveness, port: 9140 }
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 9140 }
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 9140 }
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            limits: { memory: "600Mi" }
            requests: { cpu: "50m", memory: "400Mi" }   # gate2 A-5: 실사용 374>req320 스케줄러 정합
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            readOnlyRootFilesystem: true
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: settlement
  namespace: openat
spec:
  selector: { app: settlement }
  ports: [{ port: 9140, targetPort: 9140 }]
