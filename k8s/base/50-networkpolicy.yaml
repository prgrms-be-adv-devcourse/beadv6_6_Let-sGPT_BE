# 데이터 tier(postgres/kafka/redis/elasticsearch) ingress-only 격리.
# NetworkPolicy는 선택된 파드에 정책이 하나라도 붙으면 그 파드는 명시 허용 외 전부 차단하므로,
# 아래 4개 정책으로 데이터 tier를 잠그고, AI는 application·management 포트를 분리해
# Gateway와 OTel Collector가 서로의 경로에 접근할 수 없게 한다.
# 신규 리소스 추가만 — 기존 워크로드 selector는 절대 변경하지 않는다(라이브 데드락 전례).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress
  namespace: openat
spec:
  podSelector:
    matchLabels: { app: postgres }
  policyTypes: [Ingress]
  ingress:
    # openat 전체 파드(앱) + observability ns(postgres-exporter)만 5432 허용.
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: observability }
      ports:
        - { port: 5432, protocol: TCP }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-ingress
  namespace: openat
spec:
  podSelector:
    matchLabels: { app: kafka }
  policyTypes: [Ingress]
  ingress:
    # openat 내부 파드만 9092 허용.
    - from:
        - podSelector: {}
      ports:
        - { port: 9092, protocol: TCP }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-ingress
  namespace: openat
spec:
  podSelector:
    matchLabels: { app: redis }
  policyTypes: [Ingress]
  ingress:
    # openat 내부 파드만 6379 허용.
    - from:
        - podSelector: {}
      ports:
        - { port: 6379, protocol: TCP }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: elasticsearch-ingress
  namespace: openat
spec:
  podSelector:
    matchLabels: { app: elasticsearch }
  policyTypes: [Ingress]
  ingress:
    # openat 내부 파드만 9200 허용.
    - from:
        - podSelector: {}
      ports:
        - { port: 9200, protocol: TCP }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-ingress
  namespace: openat
spec:
  podSelector:
    matchLabels: { app: ai }
  policyTypes: [Ingress]
  ingress:
    # 외부 애플리케이션 API는 JWT를 검증한 Gateway만 호출한다.
    - from:
        - podSelector:
            matchLabels: { app: apigateway }
      ports:
        - { port: 9160, protocol: TCP }
    # 관측 주체는 별도 management 포트만 조회한다.
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: observability }
          podSelector:
            matchLabels: { app: otel-collector }
      ports:
        - { port: 9161, protocol: TCP }
