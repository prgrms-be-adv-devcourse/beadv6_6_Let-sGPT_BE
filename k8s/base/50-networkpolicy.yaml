# 데이터 tier(postgres/kafka/redis/elasticsearch) ingress-only 격리.
# NetworkPolicy는 선택된 파드에 정책이 하나라도 붙으면 그 파드는 명시 허용 외 전부 차단하므로,
# 이 4개 정책만으로 데이터 tier가 잠긴다. 앱 파드에는 정책을 걸지 않아(무정책=전면 허용)
# traefik->apigateway->서비스 경로와 관측 스택의 앱 스크레이프 경로는 그대로 통과한다.
# 신규 리소스 추가만 — 기존 워크로드 selector는 절대 변경하지 않는다(라이브 데드락 전례).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress
  namespace: openat
spec:
  podSelector:
    matchLabels: { app: postgres }
  policyTypes: [Ingress]
  ingress:
    # openat 전체 파드(앱) + observability ns(postgres-exporter)만 5432 허용.
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: observability }
      ports:
        - { port: 5432, protocol: TCP }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-ingress
  namespace: openat
spec:
  podSelector:
    matchLabels: { app: kafka }
  policyTypes: [Ingress]
  ingress:
    # openat 내부 파드만 9092 허용.
    - from:
        - podSelector: {}
      ports:
        - { port: 9092, protocol: TCP }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-ingress
  namespace: openat
spec:
  podSelector:
    matchLabels: { app: redis }
  policyTypes: [Ingress]
  ingress:
    # openat 내부 파드만 6379 허용.
    - from:
        - podSelector: {}
      ports:
        - { port: 6379, protocol: TCP }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: elasticsearch-ingress
  namespace: openat
spec:
  podSelector:
    matchLabels: { app: elasticsearch }
  policyTypes: [Ingress]
  ingress:
    # openat 내부 파드만 9200 허용.
    - from:
        - podSelector: {}
      ports:
        - { port: 9200, protocol: TCP }
---
# redis-exporter 전용 최소권한 정책(신규 추가 — 위 데이터 tier 정책들은 건드리지 않는다).
# 이 파드는 openat에 있어 무정책=전면허용 상태였으나, 하드닝을 위해 명시적으로 격리한다.
# ingress는 스크레이프 경로만, egress는 redis 접속과 DNS만 연다.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-exporter-policy
  namespace: openat
spec:
  podSelector:
    matchLabels: { app: redis-exporter }
  policyTypes: [Ingress, Egress]
  ingress:
    # observability 네임스페이스에서 오는 9121 스크레이프만 허용. otel-collector가
    # role: pod로 이 파드를 발견해 pull하며(prometheus는 scrape_configs: []로 직접 스크레이프
    # 안 함), 둘 다 observability에 있다. 이 셀렉터는 postgres-ingress가 observability→postgres
    # 5432를 여는 것과 동일한 검증된 패턴을 미러링한 것이라 스크레이프가 끊기지 않는다.
    # readinessProbe(9121, kubelet발)는 NetworkPolicy 적용 대상이 아니라 영향 없다
    # — redis의 tcpSocket 6379 probe가 ingress-only 정책 아래 정상 동작하는 것으로 검증됨.
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: observability }
      ports:
        - { port: 9121, protocol: TCP }
  egress:
    # redis 접속 — openat 내 app: redis 파드 6379.
    - to:
        - podSelector:
            matchLabels: { app: redis }
      ports:
        - { port: 6379, protocol: TCP }
    # DNS — kube-system CoreDNS. REDIS_ADDR의 redis 호스트명 해석에 필요.
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
      ports:
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
