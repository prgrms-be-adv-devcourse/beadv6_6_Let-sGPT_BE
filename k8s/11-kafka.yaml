# KRaft 단일 브로커 (compose environment 이관).
# compose와 달리 KAFKA_LISTENERS를 0.0.0.0으로 바인딩한다 — compose에서는 'kafka'가
# 컨테이너 자신의 IP로 해석되지만, k8s에서 'kafka'는 Service ClusterIP라 바인딩이 불가능.
# 클라이언트가 보는 주소는 ADVERTISED_LISTENERS(kafka:9092 = Service 이름)로 동일하게 유지.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: openat
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels: { app: kafka }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      # k8s가 Service 이름(kafka) 기반으로 주입하는 docker-link 스타일 env(KAFKA_PORT=tcp://...)를
      # confluent 설정 스크립트가 브로커 설정 'port'로 오인해 기동 실패 → 주입 차단(S6 리허설에서 발견)
      enableServiceLinks: false
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - { containerPort: 9092 }
            - { containerPort: 9093 }
          env:
            - { name: CLUSTER_ID, value: "MkU3OEVBNTcwNTJENDM2Qk" }
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            # 컨트롤러는 같은 프로세스 안에 있으므로 localhost로 자기 자신을 가리킨다
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@localhost:9093" }
            - { name: KAFKA_LISTENERS, value: "INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "INTERNAL://kafka:9092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "INTERNAL" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_HEAP_OPTS, value: "-Xms350M -Xmx500M" }
            # ★ S1(final_dayplan_v2_plan §1): 자동 생성 토픽 기본 파티션 3.
            # 근거 = 계획된 최대 컨슈머 병렬성(pre-scale replica 3)과 일치(Q74 §1).
            # 파티션 키 전송 여부는 S8에서 별도 확인(파티션>1 + 키 미전송 = 순서 역전).
            - { name: KAFKA_NUM_PARTITIONS, value: "3" }
            - { name: KAFKA_LOG_DIRS, value: "/var/lib/kafka/data" }
          resources:
            limits: { memory: "700Mi" }
            requests: { cpu: "100m" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/kafka/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: openat
spec:
  selector: { app: kafka }
  ports:
    - { name: broker, port: 9092, targetPort: 9092 }
