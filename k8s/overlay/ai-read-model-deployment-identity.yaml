apiVersion: batch/v1
kind: Job
metadata:
  name: ai-read-model-apply
  annotations:
    # deploy/state 전용 값. CD가 최종 Git revision 직전의 workload revision으로 갱신한다.
    # 최종 Git revision은 자기 자신을 manifest에 넣을 수 없으므로 Argo operation에서 별도 검증한다.
    openat.io/target-workload-revision: "bootstrap"
    openat.io/deployment-run-id: "bootstrap"
    # reconciler가 쓰는 exact 3-key latch와 구분한다. exact latch는 final Git revision이
    # 정해진 뒤 Job UID/생성 시각을 검증하고 runtime에 결합한다.
    openat.io/rotation-identity: "steady"
    openat.io/target-active-resource-version-identity: "bootstrap"
    openat.io/read-model-identity: "bootstrap"
spec:
  template:
    metadata:
      labels:
        # Job pod를 과거 실행과 구분할 수 있는 label-safe identity다.
        openat.io/deployment-run-id: "bootstrap"
        openat.io/rotation-identity: "steady"
        openat.io/target-active-rv-hash: "bootstrap"
      annotations:
        openat.io/target-workload-revision: "bootstrap"
        openat.io/target-active-resource-version-identity: "bootstrap"
        openat.io/read-model-identity: "bootstrap"
