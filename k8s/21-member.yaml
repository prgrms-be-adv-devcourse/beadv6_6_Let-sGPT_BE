# ★ S2: startup/readiness/liveness probe (actuator probes — replica>1 롤링 무유실의 전제)
# ★ S5: prometheus.io/* 어노테이션 (7/10 Prometheus 구축 시 재배포 없이 scrape 대상 편입)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: member
  namespace: openat
  annotations:
    # k3s_node_coldboot_contention_plan §2-C — 순차 롤아웃(wave 낮은 순)
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  # 단일 워커 노드: 롤링 시 옛+새 파드 2배 메모리로 Insufficient memory Pending(Q80 #7) 방지.
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  selector:
    matchLabels: { app: member }
  template:
    metadata:
      labels: { app: member }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: member
          image: ghcr.io/prgrms-be-adv-devcourse/beadv6_6_let-sgpt_be/member:latest
          ports: [{ containerPort: 9100 }]
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          env:
            - { name: JAVA_TOOL_OPTIONS, value: "-Xms300m -Xmx400m" }
          # 기동 완료까지 최대 300초 유예(2vCPU에서 6개 JVM 동시 부팅 + kubelet/kube 예약 감안, 실측 최악 251s) — 이후 liveness로 전환. k3s_node_coldboot_contention_plan §2-B/§2-A 동시 적용 전제
          startupProbe:
            httpGet: { path: /actuator/health/liveness, port: 9100 }
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 9100 }
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 9100 }
            periodSeconds: 10
            failureThreshold: 3
          resources:
            limits: { memory: "600Mi" }
            requests: { cpu: "100m" }
---
apiVersion: v1
kind: Service
metadata:
  name: member
  namespace: openat
spec:
  selector: { app: member }
  ports: [{ port: 9100, targetPort: 9100 }]
