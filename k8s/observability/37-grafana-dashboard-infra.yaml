            "content": "이 대시보드는 실제로 수집되는 메트릭만 다룹니다. 유입원은 **postgres-exporter**, **애플리케이션 파드 JVM/프로세스**, 그리고 **k3s kubelet 내장 cAdvisor**(컨테이너 메모리·CPU)입니다.\n\n> cAdvisor는 kubelet(`/metrics/cadvisor`)에서 스크레이프하며 카디널리티 방어를 위해 working_set·cpu·limit·throttling·machine_memory 시리즈만 keep합니다. **node-exporter / kube-state-metrics는 미배포** — buff/cache 정밀도와 requests 대비 사용률·OOMKilled 사유는 아직 사각지대이며, 노드 여유는 `노드총량 − 파드합` 근사로 봅니다. Prometheus 자체·otel-collector 처리량은 여전히 스크레이프 대상이 아닙니다."
