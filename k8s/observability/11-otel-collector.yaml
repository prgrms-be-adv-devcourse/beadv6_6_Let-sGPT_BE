# OTel Collector 게이트웨이(단일 인스턴스, final 노드 고정) — 7-13-otel_collector_gateway_plan.md
# 앱 7종(apigateway/member/product/order/payment/settlement/search)이 Tempo에 직접 push하던 구조를
# 이 Collector 경유로 전환. 배치(batch)+공통 리소스 속성(resource) 처리 후 Tempo로 전달.
# WS-F(7-14-stateless_helm_migration_plan.md §8) — 메트릭도 이 Collector 경유로 재배선.
# prometheus 파드가 직접 하던 kubernetes_sd 스크레이프를 여기서 대신 수행(RBAC 이관) →
# prometheusremotewrite exporter로 Prometheus(/api/v1/write)에 push.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources: [nodes, services, endpoints, pods, namespaces]
    verbs: [get, list, watch]
  # k8sattributes: deployment.name 유도용 ReplicaSet 조회
  - apiGroups: ["apps"]
    resources: [replicasets]
    verbs: [get, list, watch]
  # kubelet 내장 cAdvisor(/metrics/cadvisor) 프록시 스크레이프용
  - apiGroups: [""]
    resources: [nodes/metrics]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: observability
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
spec:
  replicas: 1
  # k3s_memory_mitigation_plan §9-7 구현기 — final 노드 여유 없을 때 기본 surge 전략 방지.
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  selector:
    matchLabels: { app: otel-collector }
  template:
    metadata:
      labels: { app: otel-collector }
    spec:
      serviceAccountName: otel-collector
      nodeSelector: { tier: observability }
      tolerations:
        - { key: dedicated, operator: Equal, value: observability, effect: NoSchedule }
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.156.0
          args: ["--config=/etc/otel/otel-collector.yaml"]
          env:
            # tail_sampling 확률 폴백 단일 노브 — 값 변경 = 이 한 줄 → 머지 → collector 파드 1개만 롤링.
            - { name: OTEL_TAIL_SAMPLING_PERCENT, value: "5" }
            # k8sattributes용 downward-API 노드명. (게이트웨이는 전 노드 파드를 봐야 하므로 node 필터링엔 미사용)
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - { containerPort: 4317 }
            - { containerPort: 4318 }
          readinessProbe:
            httpGet: { path: /, port: 13133 }
            timeoutSeconds: 5         # gate2 A-1 핵심: GC 쓰래싱 중 1s 기본 타임아웃 false-negative → 0/1 방지
            periodSeconds: 10
            failureThreshold: 12
          resources:
            # k3s_memory_mitigation_plan §9-7 기준 → gate2 라이트사이징 A-1(2026-07-16)로 상향 조정.
            # 근거: limit 224Mi에서 memory_limiter GC 쓰래싱 → healthcheck(:13133) 1s 타임아웃 → 0/1 NotReady,
            # prometheusremotewrite context deadline로 1207 items drop. scrape 15→30s로 수신량 절반 + limit/limiter 상향정렬.
            # 상세: personal_workplan/plan/gate2_resource_rightsizing_plan.md §A-1(옵션 A). final 여유 1600m/실사용69%로 흡수.
            limits: { memory: "512Mi", cpu: "300m" }
            requests: { cpu: "75m", memory: "512Mi" }
          volumeMounts:
            - { name: otel-config, mountPath: /etc/otel }
      volumes:
        - name: otel-config
          configMap: { name: otel-collector-config }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
spec:
  selector: { app: otel-collector }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
