# OTel Collector 게이트웨이(단일 인스턴스, final 노드 고정) — 7-13-otel_collector_gateway_plan.md
# 앱 7종(apigateway/member/product/order/payment/settlement/search)이 Tempo에 직접 push하던 구조를
# 이 Collector 경유로 전환. 배치(batch)+공통 리소스 속성(resource) 처리 후 Tempo로 전달.
# WS-F(7-14-stateless_helm_migration_plan.md §8) — 메트릭도 이 Collector 경유로 재배선.
# prometheus 파드가 직접 하던 kubernetes_sd 스크레이프를 여기서 대신 수행(RBAC 이관) →
# prometheusremotewrite exporter로 Prometheus(/api/v1/write)에 push.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources: [nodes, services, endpoints, pods]
    verbs: [get, list, watch]
  # kubelet 내장 cAdvisor(/metrics/cadvisor) 프록시 스크레이프용
  - apiGroups: [""]
    resources: [nodes/metrics]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  otel-collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
      prometheus:
        config:
          global:
            scrape_interval: 30s        # gate2 A-1: 수신량·staleness 메모리 절반 (인프라 대시보드 30s 해상도 충분)
          scrape_configs:
            - job_name: kubernetes-pods
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  target_label: __address__
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_label_app]
                  target_label: app
                # 파드 단위 드릴다운용 — instance(IP:포트)는 사람이 못 읽어서 pod명을 라벨로.
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod
              metric_relabel_configs:
                # cert-manager 네임스페이스 전량 드롭 — 대시보드 참조 0건, 실측 712~975 시리즈.
                # 인증서 만료는 패널이 아니라 cert-manager 이벤트/로그로 본다.
                - source_labels: [namespace]
                  regex: cert-manager
                  action: drop
                # kube-system(traefik) 전량 드롭 — 대시보드 참조 0건, 실측 48~356 시리즈.
                - source_labels: [namespace]
                  regex: kube-system
                  action: drop
                # postgres-exporter는 1,702 시리즈를 내보내는데 대시보드가 쓰는 건 8개 이름 30 시리즈뿐.
                # RE2에 부정 전방탐색이 없어 "허용 표시 후 미표시분 드롭" 2단 구성으로 처리한다.
                - source_labels: [__name__]
                  regex: pg_up|pg_database_size_bytes|pg_stat_activity_count|pg_stat_database_deadlocks|pg_stat_database_tup_fetched|pg_stat_database_tup_returned|pg_stat_database_xact_commit|pg_stat_database_xact_rollback
                  target_label: __tmp_pg_keep
                  replacement: "yes"
                - source_labels: [__name__, __tmp_pg_keep]
                  regex: pg_.*;
                  action: drop
            # k3s kubelet 내장 cAdvisor — 별도 파드 없이 컨테이너별 메모리/CPU 확보.
            # Prometheus 288Mi 보호를 위해 keep 필터로 시리즈 최소화.
            - job_name: kubernetes-cadvisor
              scheme: https
              tls_config:
                insecure_skip_verify: true
              authorization:
                credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - source_labels: [__meta_kubernetes_node_name]
                  target_label: node
                - target_label: __metrics_path__
                  replacement: /metrics/cadvisor
              metric_relabel_configs:
                # 카디널리티 방어 — 필요한 시리즈만 keep
                - source_labels: [__name__]
                  regex: container_memory_working_set_bytes|container_cpu_usage_seconds_total|container_spec_memory_limit_bytes|container_cpu_cfs_throttled_periods_total|container_cpu_cfs_periods_total|machine_memory_bytes
                  action: keep
                # 파드 아닌 cgroup 중간노드(빈 pod 라벨) 제거. 단 machine_*는 pod 라벨이 없으므로 예외 통과.
                - source_labels: [__name__, pod]
                  regex: "machine_.*;|[^;]*;.+"
                  action: keep
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256        # gate2 A-1: resources.limits.memory(320Mi)−64Mi(Go 비힙 쿠션). OOMKill 전 스스로 드롭
        spike_limit_mib: 48   # soft=208, hard=256
      batch:
        timeout: 5s
        send_batch_size: 1024
      resource:
        attributes:
          - { key: k8s.cluster.name, value: "openat-k3s", action: upsert }
          - { key: deployment.environment, value: "production", action: upsert }
    exporters:
      otlp/tempo:
        endpoint: "tempo.observability.svc.cluster.local:4317"
        tls:
          insecure: true
      prometheusremotewrite:
        endpoint: "http://prometheus.observability.svc.cluster.local:9090/api/v1/write"
        tls:
          insecure: true
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [otlp/tempo]
        metrics:
          receivers: [prometheus]
          processors: [memory_limiter, batch, resource]
          exporters: [prometheusremotewrite]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
spec:
  replicas: 1
  # k3s_memory_mitigation_plan §9-7 구현기 — final 노드 여유 없을 때 기본 surge 전략 방지.
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  selector:
    matchLabels: { app: otel-collector }
  template:
    metadata:
      labels: { app: otel-collector }
    spec:
      serviceAccountName: otel-collector
      nodeSelector: { tier: observability }
      tolerations:
        - { key: dedicated, operator: Equal, value: observability, effect: NoSchedule }
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.156.0
          args: ["--config=/etc/otel/otel-collector.yaml"]
          ports:
            - { containerPort: 4317 }
            - { containerPort: 4318 }
          readinessProbe:
            httpGet: { path: /, port: 13133 }
            timeoutSeconds: 5         # gate2 A-1 핵심: GC 쓰래싱 중 1s 기본 타임아웃 false-negative → 0/1 방지
            periodSeconds: 10
            failureThreshold: 12
          resources:
            # k3s_memory_mitigation_plan §9-7 기준 → gate2 라이트사이징 A-1(2026-07-16)로 상향 조정.
            # 근거: limit 224Mi에서 memory_limiter GC 쓰래싱 → healthcheck(:13133) 1s 타임아웃 → 0/1 NotReady,
            # prometheusremotewrite context deadline로 1207 items drop. scrape 15→30s로 수신량 절반 + limit/limiter 상향정렬.
            # 상세: personal_workplan/plan/gate2_resource_rightsizing_plan.md §A-1(옵션 A). final 여유 1600m/실사용69%로 흡수.
            limits: { memory: "320Mi", cpu: "300m" }
            requests: { cpu: "75m", memory: "192Mi" }
          volumeMounts:
            - { name: otel-config, mountPath: /etc/otel }
      volumes:
        - name: otel-config
          configMap: { name: otel-collector-config }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
spec:
  selector: { app: otel-collector }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
