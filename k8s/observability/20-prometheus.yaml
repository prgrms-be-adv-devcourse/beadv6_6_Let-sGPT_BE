# WS-C(7/10 observability plan) — plain Prometheus + kubernetes_sd. S5 어노테이션
# (prometheus.io/scrape,port,path)을 그대로 소비 — 전 서비스 파드에 이미 깔려 있음(research §3).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, services, endpoints, pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: observability
spec:
  replicas: 1
  # k3s_memory_mitigation_plan §9-7 구현기 — final 노드 여유 없을 때 기본 surge 전략이면
  # 신규 파드가 Pending으로 막힘(실사고). maxSurge:0으로 구파드 먼저 내림.
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      serviceAccountName: prometheus
      nodeSelector: { tier: observability }
      tolerations:
        - { key: dedicated, operator: Equal, value: observability, effect: NoSchedule }
      containers:
        - name: prometheus
          image: prom/prometheus:v3.13.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=3d
          ports: [{ containerPort: 9090 }]
          readinessProbe:
            httpGet: { path: /-/ready, port: 9090 }
            periodSeconds: 10
            failureThreshold: 12
          resources:
            # k3s_memory_mitigation_plan §9-7 — final limit 재분배, live 45Mi 대비 여유 충분해 축소.
            limits: { memory: "288Mi" }
            requests: { cpu: "50m", memory: "192Mi" }
          volumeMounts:
            - { name: prometheus-config, mountPath: /etc/prometheus }
            - { name: prometheus-data, mountPath: /prometheus }
      volumes:
        - name: prometheus-config
          configMap: { name: prometheus-config }
        - name: prometheus-data
          persistentVolumeClaim: { claimName: prometheus-data }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: observability
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: observability
spec:
  selector: { app: prometheus }
  ports: [{ port: 9090, targetPort: 9090 }]
