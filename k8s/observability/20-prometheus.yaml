# WS-C(7/10 observability plan) — plain Prometheus, 최초엔 kubernetes_sd로 직접 pull.
# WS-F(7-14-stateless_helm_migration_plan.md §8) — 스크레이프(SD+RBAC)를 otel-collector로
# 이관, Prometheus는 remote-write 수신 전용으로 전환(질의 경로만 유지, Grafana datasource 불변).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: observability
spec:
  replicas: 1
  # k3s_memory_mitigation_plan §9-7 구현기 — final 노드 여유 없을 때 기본 surge 전략이면
  # 신규 파드가 Pending으로 막힘(실사고). maxSurge:0으로 구파드 먼저 내림.
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      nodeSelector: { tier: observability }
      tolerations:
        - { key: dedicated, operator: Equal, value: observability, effect: NoSchedule }
      containers:
        - name: prometheus
          image: prom/prometheus:v3.13.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=3d
            - --web.enable-remote-write-receiver
          env:
            - { name: GOMEMLIMIT, value: "240MiB" }   # limit 288Mi − 비힙 쿠션
          ports: [{ containerPort: 9090 }]
          readinessProbe:
            httpGet: { path: /-/ready, port: 9090 }
            periodSeconds: 10
            failureThreshold: 12
          resources:
            # k3s_memory_mitigation_plan §9-7 — final limit 재분배, live 45Mi 대비 여유 충분해 축소.
            limits: { memory: "288Mi" }
            requests: { cpu: "50m", memory: "192Mi" }
          volumeMounts:
            - { name: prometheus-config, mountPath: /etc/prometheus }
            - { name: prometheus-data, mountPath: /prometheus }
      volumes:
        - name: prometheus-config
          configMap: { name: prometheus-config }
        - name: prometheus-data
          persistentVolumeClaim: { claimName: prometheus-data }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: observability
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: observability
spec:
  selector: { app: prometheus }
  ports: [{ port: 9090, targetPort: 9090 }]
