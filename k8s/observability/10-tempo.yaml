# WS-B(7/10 observability plan) — Tempo single binary. medium 노드(tier=observability) 전용
# 배치는 13-elasticsearch.yaml과 동일 패턴(toleration+nodeSelector 세트 필수 — research §1).
# 이미지 태그는 구현 시점(2026-07-10) 최신 안정 2.x(2.10.7) 확인 후 고정.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tempo
  namespace: observability
spec:
  serviceName: tempo
  replicas: 1
  selector:
    matchLabels: { app: tempo }
  template:
    metadata:
      labels: { app: tempo }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3200"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector: { tier: observability }
      tolerations:
        - { key: dedicated, operator: Equal, value: observability, effect: NoSchedule }
      containers:
        - name: tempo
          image: grafana/tempo:2.10.7
          args: ["-config.file=/etc/tempo/tempo.yaml", "-config.expand-env=true"]
          env:
            # Go GC를 limit(768Mi)의 83% 지점에서 조여 786Mi 도달 자체를 차단.
            # 소프트 리밋 — 라이브 힙이 이 값을 넘으면 GC 스래싱(CPU 급증)으로 나타난다.
            - { name: GOMEMLIMIT, value: "640MiB" }
            # 블록 라이프사이클 튜닝 — 상주 창 45분 → 7분(5m+2m)으로 축소, 폴링 1m 페어.
            - { name: TEMPO_ING_MAX_BLOCK_DURATION, value: "5m" }
            - { name: TEMPO_ING_MAX_BLOCK_BYTES, value: "52428800" }   # 50MiB
            - { name: TEMPO_ING_COMPLETE_BLOCK_TIMEOUT, value: "2m" }
            - { name: TEMPO_BLOCKLIST_POLL, value: "1m" }
            # 보존 기간 — expand-env가 인라인 기본값(:-)을 지원하지 않아 명시 주입.
            - { name: TEMPO_COMPACTOR_BLOCK_RETENTION, value: "48h" }
          ports:
            - { containerPort: 3200 }
            - { containerPort: 4318 }
            - { containerPort: 4317 }
          readinessProbe:
            httpGet: { path: /ready, port: 3200 }
            periodSeconds: 10
            failureThreshold: 12
          resources:
            # 400Mi 원안은 실측 OOMKilled(2026-07-11) — WAL replay+ingester+compactor 동시
            # 기동 시 400Mi를 초과해 600Mi로 상향했으나, request 미지정 시 k8s가
            # request=limit로 묵시 설정해 final 노드(실측 헤드룸 ~425Mi)에서 스케줄링
            # 자체가 실패(Insufficient memory). request를 limit보다 낮게 명시 분리해
            # 상시 예약은 작게, 버스트 여유만 600Mi까지 허용.
            limits: { memory: "768Mi" }   # gate2 A-2: steady 594/600=99% OOM 방어 헤드룸
            requests: { cpu: "50m", memory: "256Mi" }   # gate2 A-2: steady 594/600=99% OOM 방어 헤드룸
          volumeMounts:
            - { name: tempo-config, mountPath: /etc/tempo }
            - { name: tempo-data, mountPath: /var/tempo }
      volumes:
        - name: tempo-config
          configMap: { name: tempo-config }
  volumeClaimTemplates:
    - metadata: { name: tempo-data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: observability
spec:
  selector: { app: tempo }
  ports:
    - { name: http, port: 3200, targetPort: 3200 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
