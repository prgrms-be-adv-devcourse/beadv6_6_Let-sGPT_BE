# E2E 폴더 대시보드 ConfigMap — 주문→결제→정산 단계별 + Tempo 트레이스 + apigateway routeId RED.
# 'E2E' provider(path /var/lib/grafana/dashboards/e2e)가 소유. Tempo 패널은 datasource uid=tempo 참조.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-e2e
  namespace: observability
data:
  e2e.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": false,
      "graphTooltip": 1,
      "schemaVersion": 39,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "E2E — 주문·결제·정산 흐름",
      "uid": "openat-e2e",
      "tags": [
        "openat",
        "e2e"
      ],
      "links": [],
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "주문 → 결제 → 정산 단계별",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "panels": []
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "주문 생성 (order.create, 1m rate)",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never",
                "lineWidth": 1,
                "axisPlacement": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true,
              "calcs": [
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (result)(rate(order_create_result_total{app=\"order\"}[1m]))",
              "legendFormat": "{{result}}",
              "refId": "A"
            }
          ]
        },
        {
