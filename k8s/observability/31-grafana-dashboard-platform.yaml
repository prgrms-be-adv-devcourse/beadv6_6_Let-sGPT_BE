# 전체 개요 폴더 대시보드 ConfigMap — 서비스 횡단(cross-service) 관측을 한 폴더로 묶는다.
# JVM(파드별 분리) + HTTP RED 개요(서비스 합산) + E2E 비즈니스 흐름 + 인프라(DB·파드 리소스).
# grafana-dashboard-providers의 '전체 개요' provider(path /var/lib/grafana/dashboards/platform)가 소유.
# 라벨 체계: 앱 파드는 app(서비스명)/pod(파드명) 기준. instance(IP:포트)는 사용하지 않는다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-platform
  namespace: observability
data:
  jvm-micrometer.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "name": "Annotations & Alerts",
            "type": "dashboard"
          },
          {
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "enable": true,
            "expr": "resets(process_uptime_seconds{app=~\"$app\",pod=~\"$pod\"}[1m]) > 0",
            "iconColor": "rgba(255, 96, 96, 1)",
            "name": "Restart Detection",
            "titleFormat": "Restart",
            "type": "tags"
          }
        ]
      },
      "editable": false,
      "graphTooltip": 1,
      "schemaVersion": 39,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "공통 — JVM (Micrometer)",
      "uid": "openat-common-jvm",
      "tags": [
        "openat",
        "common"
      ],
      "links": [],
      "templating": {
        "list": [
          {
            "name": "app",
            "label": "app",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "allValue": ".*",
            "current": {
              "text": "All",
              "value": "$__all"
            },
            "definition": "label_values(jvm_memory_used_bytes, app)",
            "query": {
              "query": "label_values(jvm_memory_used_bytes, app)",
              "refId": "var"
            },
            "options": [],
            "regex": "",
            "sort": 1
          },
          {
            "name": "pod",
            "label": "pod",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "allValue": ".*",
            "current": {
              "text": "All",
              "value": "$__all"
            },
            "definition": "label_values(jvm_memory_used_bytes{app=~\"$app\"}, pod)",
            "query": {
              "query": "label_values(jvm_memory_used_bytes{app=~\"$app\"}, pod)",
              "refId": "var"
            },
            "options": [],
            "regex": "",
            "sort": 1
          },
          {
            "name": "heap_pool",
            "label": "heap pool",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "allValue": ".*",
            "current": {
              "text": "All",
              "value": "$__all"
            },
            "definition": "label_values(jvm_memory_used_bytes{app=~\"$app\",pod=~\"$pod\",area=\"heap\"}, id)",
            "query": {
              "query": "label_values(jvm_memory_used_bytes{app=~\"$app\",pod=~\"$pod\",area=\"heap\"}, id)",
              "refId": "var"
            },
            "options": [],
            "regex": "",
            "sort": 1
          },
          {
            "name": "nonheap_pool",
            "label": "non-heap pool",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "allValue": ".*",
            "current": {
              "text": "All",
              "value": "$__all"
            },
            "definition": "label_values(jvm_memory_used_bytes{app=~\"$app\",pod=~\"$pod\",area=\"nonheap\"}, id)",
            "query": {
              "query": "label_values(jvm_memory_used_bytes{app=~\"$app\",pod=~\"$pod\",area=\"nonheap\"}, id)",
              "refId": "var"
            },
            "options": [],
            "regex": "",
            "sort": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "**집계 축 안내** — HTTP RED(개요 장)는 서비스 단위 `sum by (app)`이 표준(요청은 파드 간 분산되므로 합이 의미). JVM(이 장)은 **파드별 분리**가 표준 — 힙·GC·스레드를 파드 합으로 내면 OOM 직전 파드가 희석되어 안 보인다. 두 장의 집계가 다른 것은 의도된 설계다."
          }
        },
        {
          "id": 2,
          "type": "row",
          "title": "Quick Facts",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 3 },
          "panels": []
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Uptime",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 4 },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": [ "lastNotNull" ], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "value_and_name",
            "orientation": "horizontal"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "process_uptime_seconds{app=~\"$app\",pod=~\"$pod\"}",
              "legendFormat": "{{app}}/{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Start time",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 4 },
          "fieldConfig": {
            "defaults": {
              "unit": "dateTimeAsIso",
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": [ "lastNotNull" ], "fields": "", "values": false },
            "colorMode": "none",
            "graphMode": "none",
            "textMode": "value_and_name",
            "orientation": "horizontal"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "process_start_time_seconds{app=~\"$app\",pod=~\"$pod\"}*1000",
              "legendFormat": "{{app}}/{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Heap used %",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 4 },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 } ] }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": [ "lastNotNull" ], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "value_and_name",
            "orientation": "horizontal"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (app, pod)(jvm_memory_used_bytes{app=~\"$app\",pod=~\"$pod\",area=\"heap\"})*100 / clamp_min(sum by (app, pod)(jvm_memory_max_bytes{app=~\"$app\",pod=~\"$pod\",area=\"heap\"}),1)",
              "legendFormat": "{{app}}/{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Non-Heap used %",
          "description": "논힙 풀은 max가 -1인 경우가 있어 분모를 committed로 잡는다.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 4 },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 80 }, { "color": "red", "value": 95 } ] }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": [ "lastNotNull" ], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "value_and_name",
            "orientation": "horizontal"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (app, pod)(jvm_memory_used_bytes{app=~\"$app\",pod=~\"$pod\",area=\"nonheap\"})*100 / clamp_min(sum by (app, pod)(jvm_memory_committed_bytes{app=~\"$app\",pod=~\"$pod\",area=\"nonheap\"}),1)",
              "legendFormat": "{{app}}/{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "type": "row",
          "title": "JVM Memory",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 8 },
          "panels": []
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "JVM Heap (used/committed/max)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 9 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "showPoints": "never", "lineWidth": 1, "axisPlacement": "auto" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true, "calcs": [ "lastNotNull" ] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (app, pod)(jvm_memory_used_bytes{app=~\"$app\",pod=~\"$pod\",area=\"heap\"})",
              "legendFormat": "{{app}}/{{pod}} used",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (app, pod)(jvm_memory_committed_bytes{app=~\"$app\",pod=~\"$pod\",area=\"heap\"})",
              "legendFormat": "{{app}}/{{pod}} committed",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (app, pod)(jvm_memory_max_bytes{app=~\"$app\",pod=~\"$pod\",area=\"heap\"})",
              "legendFormat": "{{app}}/{{pod}} max",
              "refId": "C"
            }
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "JVM Non-Heap (used/committed/max)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 9 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "showPoints": "never", "lineWidth": 1, "axisPlacement": "auto" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true, "calcs": [ "lastNotNull" ] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (app, pod)(jvm_memory_used_bytes{app=~\"$app\",pod=~\"$pod\",area=\"nonheap\"})",
              "legendFormat": "{{app}}/{{pod}} used",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (app, pod)(jvm_memory_committed_bytes{app=~\"$app\",pod=~\"$pod\",area=\"nonheap\"})",
              "legendFormat": "{{app}}/{{pod}} committed",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (app, pod)(jvm_memory_max_bytes{app=~\"$app\",pod=~\"$pod\",area=\"nonheap\"})",
              "legendFormat": "{{app}}/{{pod}} max",
              "refId": "C"
            }
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Container Memory (working set)",
          "description": "Micrometer는 프로세스 RSS를 노출하지 않아 cAdvisor working set으로 대체. 파드 재시작 중복 계상 방지를 위해 max by (pod, container)로 내부 dedupe.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 9 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "showPoints": "never", "lineWidth": 1, "axisPlacement": "auto" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true, "calcs": [ "lastNotNull" ] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max by (pod, container)(container_memory_working_set_bytes{namespace=\"openat\",pod=~\"$pod\",container!=\"\"})",
              "legendFormat": "{{pod}}/{{container}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 11,
          "type": "row",
          "title": "JVM Misc",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 17 },
          "panels": []
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "CPU",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 18 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "showPoints": "never", "lineWidth": 1, "axisPlacement": "auto" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true, "calcs": [ "lastNotNull" ] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "process_cpu_usage{app=~\"$app\",pod=~\"$pod\"}",
              "legendFormat": "{{app}}/{{pod}} process",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "system_cpu_usage{app=~\"$app\",pod=~\"$pod\"}",
              "legendFormat": "{{app}}/{{pod}} system",
              "refId": "B"
            }
          ]
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Load",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 18 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "showPoints": "never", "lineWidth": 1, "axisPlacement": "auto" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true, "calcs": [ "lastNotNull" ] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "system_load_average_1m{app=~\"$app\",pod=~\"$pod\"}",
              "legendFormat": "{{app}}/{{pod}} load-1m",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "system_cpu_count{app=~\"$app\",pod=~\"$pod\"}",
              "legendFormat": "{{app}}/{{pod}} cpus",
              "refId": "B"
            }
          ]
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Threads",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 18 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "showPoints": "never", "lineWidth": 1, "axisPlacement": "auto" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true, "calcs": [ "lastNotNull" ] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_threads_live_threads{app=~\"$app\",pod=~\"$pod\"}",
              "legendFormat": "{{app}}/{{pod}} live",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_threads_daemon_threads{app=~\"$app\",pod=~\"$pod\"}",
              "legendFormat": "{{app}}/{{pod}} daemon",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_threads_peak_threads{app=~\"$app\",pod=~\"$pod\"}",
              "legendFormat": "{{app}}/{{pod}} peak",
              "refId": "C"
            }
          ]
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "File Descriptors",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 26 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "showPoints": "never", "lineWidth": 1, "axisPlacement": "auto" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true, "calcs": [ "lastNotNull" ] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "process_files_open_files{app=~\"$app\",pod=~\"$pod\"}",
              "legendFormat": "{{app}}/{{pod}} open",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "process_files_max_files{app=~\"$app\",pod=~\"$pod\"}",
              "legendFormat": "{{app}}/{{pod}} max",
              "refId": "B"
            }
          ]
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Log Events (1m)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 16, "x": 8, "y": 26 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "showPoints": "never", "lineWidth": 1, "axisPlacement": "auto" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true, "calcs": [ "lastNotNull" ] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (app, pod, level)(increase(logback_events_total{app=~\"$app\",pod=~\"$pod\"}[1m]))",
              "legendFormat": "{{app}}/{{pod}} {{level}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 17,
          "type": "row",
          "title": "Memory Pools (Heap)",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 34 },
          "panels": []
        },
        {
          "id": 18,
          "type": "timeseries",
          "title": "$heap_pool",
          "repeat": "heap_pool",
          "repeatDirection": "h",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 35 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "showPoints": "never", "lineWidth": 1, "axisPlacement": "auto" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true, "calcs": [ "lastNotNull" ] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (app, pod)(jvm_memory_used_bytes{app=~\"$app\",pod=~\"$pod\",id=\"$heap_pool\"})",
              "legendFormat": "{{app}}/{{pod}} used",
              "refId": "A"
