# 도메인 폴더 대시보드 ConfigMap — 서비스당 1장(공통 골격 RED+JVM 요약 + 서비스별 커스텀 행).
# '도메인' provider(path /var/lib/grafana/dashboards/domain)가 소유.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-domain
  namespace: observability
data:
  domain-apigateway.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": false,
      "graphTooltip": 1,
      "schemaVersion": 39,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "도메인 — apigateway",
      "uid": "openat-domain-apigateway",
      "tags": [
        "openat",
        "domain",
        "apigateway"
      ],
      "links": [],
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "HTTP RED",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "panels": []
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Request Rate (req/s)",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never",
                "lineWidth": 1,
                "axisPlacement": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true,
              "calcs": [
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(rate(http_server_requests_seconds_count{app=\"apigateway\"}[1m]))",
              "legendFormat": "req/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Error Rate 5xx (req/s)",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never",
                "lineWidth": 1,
                "axisPlacement": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true,
              "calcs": [
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(rate(http_server_requests_seconds_count{app=\"apigateway\",status=~\"5..\"}[1m]))",
              "legendFormat": "5xx",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Latency avg / max (s)",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never",
                "lineWidth": 1,
                "axisPlacement": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true,
              "calcs": [
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(rate(http_server_requests_seconds_sum{app=\"apigateway\"}[5m]))/clamp_min(sum(rate(http_server_requests_seconds_count{app=\"apigateway\"}[5m])),0.001)",
              "legendFormat": "avg",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max(http_server_requests_seconds_max{app=\"apigateway\"})",
              "legendFormat": "max",
              "refId": "B"
            }
          ]
        },
        {
          "id": 5,
          "type": "row",
          "title": "JVM 요약",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 9
          },
          "panels": []
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Heap Used %",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 10
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(jvm_memory_used_bytes{app=\"apigateway\",area=\"heap\"})*100/clamp_min(sum(jvm_memory_max_bytes{app=\"apigateway\",area=\"heap\"}),1)",
              "legendFormat": "heap",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Process CPU",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 10
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.7
                  },
                  {
                    "color": "red",
                    "value": 0.9
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "avg(process_cpu_usage{app=\"apigateway\"})",
              "legendFormat": "cpu",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Live Threads",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 10
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
