            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (routeId)(rate(spring_cloud_gateway_requests_seconds_count{app=\"apigateway\"}[1m]))",
              "legendFormat": "{{routeId}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Gateway latency avg by routeId",
