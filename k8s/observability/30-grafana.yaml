# WS-D(7/10 observability plan) — Grafana. 이제 Ingress로 외부 노출(34-grafana-ingress.yaml,
# Traefik rate-limit/inflight + HTTPS 리다이렉트 체인). admin 비밀번호는 하드코딩 금지(create-secrets.sh
# 참고) — "실패는 시끄럽게" 원칙상 Secret(grafana-admin) 미존재 시 파드가 뜨지 않는 편이 낫다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      # uid 고정 — 대시보드 JSON이 datasource를 uid로 참조(prometheus/tempo). 미지정 시 랜덤 uid가
      # 배정되어 프로비저닝 대시보드의 datasource 참조가 깨진다. 기존 name 참조("Prometheus")도 계속 유효.
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: "http://prometheus:9090"
        isDefault: true
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: "http://tempo:3200"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: observability
data:
  providers.yaml: |
    apiVersion: 1
    providers:
      # 폴더 소유권을 ConfigMap(provider)이 가짐 — 폴더당 provider 1개, 폴더는 프로비저닝 시 자동 생성.
      # 각 path는 Deployment에서 해당 폴더 ConfigMap을 마운트한 디렉토리와 1:1 대응.
      - name: 공통
        orgId: 1
        folder: 공통
        type: file
        disableDeletion: false
        allowUiUpdates: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards/common
          foldersFromFilesStructure: false
      - name: 도메인
        orgId: 1
        folder: 도메인
        type: file
        disableDeletion: false
        allowUiUpdates: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards/domain
          foldersFromFilesStructure: false
      - name: 결제
        orgId: 1
        folder: 결제
        type: file
        disableDeletion: false
        allowUiUpdates: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards/payment
          foldersFromFilesStructure: false
      - name: E2E
        orgId: 1
        folder: E2E
        type: file
        disableDeletion: false
        allowUiUpdates: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards/e2e
          foldersFromFilesStructure: false
      - name: 인프라
        orgId: 1
        folder: 인프라
        type: file
        disableDeletion: false
        allowUiUpdates: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards/infra
          foldersFromFilesStructure: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
spec:
  replicas: 1
  # k3s_memory_mitigation_plan §9-7 구현기 — 기본 25% surge 전략은 final 노드에
  # 여유가 없을 때 신규 파드 스케줄링 자체가 막혀 롤아웃이 Pending으로 정지함(실사고).
  # 앱 7종과 동일하게 maxSurge:0으로 구파드 먼저 내리고 새 파드를 띄우게 강제.
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      nodeSelector: { tier: observability }
      tolerations:
        - { key: dedicated, operator: Equal, value: observability, effect: NoSchedule }
      containers:
        - name: grafana
          image: grafana/grafana:11.6.16
          ports: [{ containerPort: 3000 }]
          env:
            # admin 자격은 Secret(grafana-admin)에서만 주입 — 미존재 시 파드 기동 실패로 시끄럽게 드러남.
            # Secret 생성은 부트스트랩 스크립트(k8s/bootstrap/create-secrets.sh, keys: admin-user/admin-password)로 수행.
            - name: GF_SECURITY_ADMIN_USER
              valueFrom: { secretKeyRef: { name: grafana-admin, key: admin-user } }
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: grafana-admin, key: admin-password } }
            # 하드닝: 익명 접근 차단 + 셀프 가입 차단(계정은 create-grafana-users.sh로만 생성).
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "false" }
            - { name: GF_USERS_ALLOW_SIGN_UP, value: "false" }
            # TLS 인그레스 뒤에서의 절대경로 리다이렉트/asset URL 정합.
            - { name: GF_SERVER_ROOT_URL, value: "https://grafana.openat.duckdns.org" }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            periodSeconds: 10
            failureThreshold: 12
          resources:
            # k3s_memory_mitigation_plan §9-7 — final limit 재분배. live 143Mi 대비 여유 축소(victim #1 유지).
            limits: { memory: "176Mi" }
            requests: { cpu: "30m", memory: "128Mi" }  # k3s_memory_mitigation_plan §7-2 — 의도적 usage>request(eviction victim #1)
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashboard-providers, mountPath: /etc/grafana/provisioning/dashboards }
            # 폴더별 ConfigMap을 provider path와 1:1로 마운트(폴더당 디렉토리 1개).
            - { name: dash-common, mountPath: /var/lib/grafana/dashboards/common }
            - { name: dash-domain, mountPath: /var/lib/grafana/dashboards/domain }
            - { name: dash-payment, mountPath: /var/lib/grafana/dashboards/payment }
            - { name: dash-e2e, mountPath: /var/lib/grafana/dashboards/e2e }
            - { name: dash-infra, mountPath: /var/lib/grafana/dashboards/infra }
      volumes:
        - name: datasources
          configMap: { name: grafana-datasources }
        - name: dashboard-providers
          configMap: { name: grafana-dashboard-providers }
        - name: dash-common
          configMap: { name: grafana-dashboard-common }
        - name: dash-domain
          configMap: { name: grafana-dashboard-domain }
        - name: dash-payment
          configMap: { name: grafana-dashboard-payment }
        - name: dash-e2e
          configMap: { name: grafana-dashboard-e2e }
        - name: dash-infra
          configMap: { name: grafana-dashboard-infra }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
spec:
  selector: { app: grafana }
  ports: [{ port: 3000, targetPort: 3000 }]
