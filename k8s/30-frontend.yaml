# compose 시절 "80 리버스프록시 + 정적서빙" nginx는 역할이 쪼개짐:
# TLS/L7 라우팅 → Traefik Ingress, FE 정적 서빙 → 이 Deployment (Ingress 뒤 일반 서비스).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: openat
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: frontend
          # FE 리포(beadv6_6_Let-sGPT_FE) 소문자 경로. 과거 문서의 "lets-gpt_fe" 표기는
          # 리포명(let-sgpt)과 불일치 — PAT 확보 후 실제 패키지 경로 재확인할 것.
          image: ghcr.io/prgrms-be-adv-devcourse/beadv6_6_let-sgpt_fe/frontend:latest
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
            periodSeconds: 5
          resources:
            limits: { memory: "128Mi" }
            requests: { cpu: "50m" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: openat
spec:
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80 }]
