# dex(SSO)/notifications/applicationset-controller 완전 제거 — 이 규모(medium 4GB, 관측 스택과
# 동거)에서 상주 비용 대비 불필요(argocd_ci_smoke_research §3.3). Application CR은 GUI/CLI로
# 등록하는 표준 방식만 쓰므로 이 세 컴포넌트가 없어도 sync/health 기능은 전부 동작한다.
# 각 컴포넌트의 Deployment+Service+RBAC+NetworkPolicy까지 전부 제거(러너 없는 죽은 권한 최소화).

# --- applicationset-controller ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-applicationset-controller-network-policy
$patch: delete

