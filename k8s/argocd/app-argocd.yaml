# ArgoCD가 자기 자신(k8s/argocd/)을 감시하게 하는 self-management Application("app of apps"
# 패턴의 최소 형태). 이전엔 이 디렉토리가 GitOps 관리 밖이라 patch-resources.yaml 변경마다
# kubectl apply -k를 수동으로 다시 태워야 했음(k3s_memory_mitigation_plan §9-9 사고 대응 중 확인).
# targetRevision=main — 관측 스택과 동일하게 이미지 SHA 핀이 필요 없는 정적 인프라라 main 직추적.
#
# 부트스트랩 순서(닭-달걀 불변 — qna.md Q92-3): 이 리소스 자체는 여전히 최초 1회
# `kubectl apply -k k8s/argocd/`로 수동 설치되어야 한다(ArgoCD가 존재하기 전엔 ArgoCD가
# 자신을 못 깖). 이후부터는 이 Application이 main의 k8s/argocd/ 변경을 auto-sync한다.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/prgrms-be-adv-devcourse/beadv6_6_Let-sGPT_BE
    targetRevision: main
    path: k8s/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  ignoreDifferences:
    # 운영자 브레이크: 클러스터에서 Application의 자동동기화를 꺼도(automated 제거)
    # 자기감시 selfHeal이 되살리지 않는다. 대상은 automated 필드만 —
    # syncOptions 등 나머지 syncPolicy는 계속 깃으로 수렴한다.
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /spec/syncPolicy/automated
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    # ServerSideApply=true: helm 렌더 전환(Q112) 후 self-sync가 client-side 3-way merge로
    # Deployment/StatefulSet의 immutable spec.selector 를 패치에 포함해 "field is immutable"로
    # sync 전체가 실패하던 문제(Q113-C) 해소. SSA는 managedFields 기반이라 값이 일치하면
    # 불변 필드를 패치에 넣지 않는다. CreateNamespace=false 는 부트스트랩 규약 유지.
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      # ignoreDifferences를 비교뿐 아니라 실제 동기화(apply)에도 적용 —
      # 이게 없으면 깃 커밋이 올 때마다 automated가 되살아난다.
      - RespectIgnoreDifferences=true
