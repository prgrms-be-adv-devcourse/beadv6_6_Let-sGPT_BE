# ArgoCD 자체 설치 매니페스트. k8s/(앱 매니페스트) kustomization과 완전히 분리된 디렉토리 —
# openat Application(source.path=k8s)이 이 디렉토리를 sync 대상으로 삼지 않도록
# k8s/kustomization.yaml의 resources에는 절대 넣지 않는다.
# 최초 설치만 수동: kubectl apply -k k8s/argocd/ (서버 노드에서, kubeconfig 필요 — 닭-달걀,
# qna.md Q92-3). 그 이후부턴 app-argocd.yaml(self-management Application)이 이 디렉토리를
# 자체 auto-sync한다 — k3s_memory_mitigation_plan §9-9~10 사고 대응 중 도입.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - 00-namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.4/manifests/install.yaml
  - app-openat.yaml
  - app-observability.yaml
  - app-argocd.yaml

patches:
  - path: delete-extras.yaml    # dex/notifications/applicationset 제거
  - path: patch-resources.yaml  # 컴포넌트별 memory limit + medium 노드 배치
