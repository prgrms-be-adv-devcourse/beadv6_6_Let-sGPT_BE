# ArgoCD 자체 설치 kustomization. k8s/(앱 매니페스트) kustomization 과 완전히 분리된 디렉토리 —
# openat Application(source.path=k8s/overlay)이 이 디렉토리를 sync 대상으로 삼지 않도록
# k8s/base/kustomization.yaml 의 resources 에는 절대 넣지 않는다.
#
# 설치본은 원격 install.yaml URL 이 아니라 직접 관리하는 로컬 정적 파일(argocd-install.yaml)이다.
# helm 안 씀 — 설정 변경은 이 파일을 직접 수정한다(파일 상단 배너의 변경사항 체크리스트 참고).
# 이전의 원격 URL + delete-extras.yaml + patch-resources.yaml 손패치 구조, 그리고 그 사이의
# helm 렌더 구조(k3s_memory_mitigation_plan §9-12/9-13, C안) 모두 폐기
# (근거: personal_workplan/research/7-14-argocd_helm_removal_research.md).
# → repo-server 가 sync 마다 원격 대용량 매니페스트를 fetch/렌더하던 부하(§9-11 OOM 근원)를 제거,
#   observability/openat 와 동일하게 로컬 정적 파일만 읽는다. 패치 스텝이 없어 upstream 구조
#   변경으로 조용히 no-op되는 실패유형(PR #89류)도 구조적으로 봉쇄됨.
#
# 최초 설치만 수동: kubectl apply -k k8s/argocd/ --server-side --force-conflicts (서버 노드, kubeconfig 필요 —
# 닭-달걀, qna.md Q92-3). 그 이후부턴 app-argocd.yaml(self-management Application)이 이 디렉토리를 auto-sync.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - 00-namespace.yaml
  - argocd-install.yaml       # 직접 관리 파일(ArgoCD v3.4.4 기반, helm 안 씀) — 수정은 이 파일에서 직접
  - app-openat.yaml
  - app-observability.yaml
  - app-argocd.yaml
