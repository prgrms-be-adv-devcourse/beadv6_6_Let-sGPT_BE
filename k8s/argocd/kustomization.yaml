# ArgoCD 자체 설치 매니페스트. k8s/(앱 매니페스트) kustomization과 완전히 분리된 디렉토리 —
# ArgoCD의 openat Application(source.path=k8s)이 이 디렉토리를 sync 대상으로 삼지 않도록
# k8s/kustomization.yaml의 resources에는 절대 넣지 않는다(자기 자신을 관리 안 함).
# 적용: kubectl apply -k k8s/argocd/ (서버 노드에서, kubeconfig 필요 — 1회성 설치/업그레이드).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - 00-namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.4/manifests/install.yaml
  - app-openat.yaml

patches:
  - path: delete-extras.yaml    # dex/notifications/applicationset 제거
  - path: patch-resources.yaml  # 컴포넌트별 memory limit + medium 노드 배치
