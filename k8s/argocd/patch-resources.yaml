# 남은 4개 컴포넌트(server/repo-server/application-controller/redis) 전부 medium 노드
# (tier=observability, taint dedicated=observability:NoSchedule)로 배치 + memory limit 부여
# (Q74 확정 스케줄링 규약, argocd_ci_smoke_research §3.4). 기본 install.yaml은 이 4개 컨테이너
# 전부 resources 미설정(무제한)이라 limit만 추가하며 기존 필드는 건드리지 않는다.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-redis
spec:
  template:
    spec:
      nodeSelector: { tier: observability }
      tolerations:
        - { key: dedicated, operator: Equal, value: observability, effect: NoSchedule }
      containers:
        - name: redis
          resources:
            limits: { memory: "48Mi" }  # k3s_memory_mitigation_plan §9-7 — final limit 재분배
            requests: { memory: "32Mi" }  # k3s_memory_mitigation_plan §7-2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
spec:
  template:
    spec:
      nodeSelector: { tier: observability }
      tolerations:
        - { key: dedicated, operator: Equal, value: observability, effect: NoSchedule }
      containers:
        - name: argocd-repo-server
          resources:
            limits: { memory: "140Mi" }  # k3s_memory_mitigation_plan §9-7 — final limit 재분배
            requests: { memory: "96Mi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
spec:
  template:
    spec:
      nodeSelector: { tier: observability }
      tolerations:
        - { key: dedicated, operator: Equal, value: observability, effect: NoSchedule }
      containers:
        - name: argocd-server
          resources:
            limits: { memory: "80Mi" }  # k3s_memory_mitigation_plan §9-7 — final limit 재분배
            requests: { memory: "48Mi" }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argocd-application-controller
spec:
  template:
    spec:
      nodeSelector: { tier: observability }
      tolerations:
        - { key: dedicated, operator: Equal, value: observability, effect: NoSchedule }
      containers:
        - name: argocd-application-controller
          # k3s_memory_mitigation_plan §9-9~11 — 92Mi/300Mi 둘 다 OOMKilled 실측(300Mi는
          # 기동 7초 만에 죽음 — 추측치로는 재현 불가). 1000Mi로 임시 상향해 안정화시킨 뒤
          # 실측(steady-state 257~307Mi, 재시작 0)한 결과를 근거로 여유 2배 반영해 확정.
          resources:
            limits: { memory: "600Mi" }
            requests: { memory: "280Mi" }
