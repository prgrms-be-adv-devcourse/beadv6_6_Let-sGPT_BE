server:
  port: 9220

spring:
  profiles:
    active: local
  application:
    name: recommendation-service
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: recommendation
        format_sql: false
        show_sql: false
        jdbc:
          time_zone: Asia/Seoul

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# k8s probe + Prometheus 메트릭
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true   # k8s 밖에서도 readiness/liveness 활성화
  tracing:
    export:
      otlp:
        enabled: false   # 로컬 기본 off (k8s ConfigMap에서 true로 override)
