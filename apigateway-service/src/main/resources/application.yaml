server:
  port: 8000

spring:
  application:
    name: apigateway-service
  cloud:
    gateway:
      # Auto-create routes for every service registered in Eureka:
      #   http://localhost:8000/<SERVICE-ID>/**  ->  lb://<SERVICE-ID>
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      server:
        webflux:
          # Example explicit route.
          # config-service is infrastructure (not registered in Eureka), so it is
          # routed by a static URI rather than load-balanced via lb://.
          # Business services registered in Eureka are reachable automatically
          # through the discovery locator above (e.g. /order-service/**).
          routes:
            - id: config-service
              uri: http://localhost:8888
              predicates:
                - Path=/config-service/**
              filters:
                - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
