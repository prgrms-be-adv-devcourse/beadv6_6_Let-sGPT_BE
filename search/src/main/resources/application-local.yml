spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/openat   # 로컬 도커 DB
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # 로컬은 엔티티 기준으로 없는 테이블만 생성하고 재기동 간 데이터는 보존(update).
      # compose/운영 프로필은 validate(application.yml 기본값)를 유지.
      ddl-auto: update

services:
  member:
    url: http://localhost:9100                     # 타모듈 localhost
  product:
    url: http://localhost:9110
