server:
  port: 9240

spring:
  profiles:
    active: local
  application:
    name: search-service
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  batch:
    job:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        format_sql: false
        show_sql: false
  sql:
    init:
      mode: always
      schema-locations: classpath:batch-schema-postgresql.sql
  datasource:
    hikari:
      maximum-pool-size: 10
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  kafka:
    consumer:
      group-id: search-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: record
      concurrency: 2

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

api:
  init: /api/v1

elastic:
  search:
    score: 0.5

search:
  refresh_index_enabled: false
  refresh_index_term: 10
  product-sync-test-url: http://localhost:9240/api/v1/searchs/search-sync-test
  elasticsearch:
    index-name: products
  batch:
    chunk-size: 100
    thread-pool-size: 2
  kafka:
    topic:
      product-created: product.created.events
      product-updated: product.updated.events
      product-deleted: product.deleted.events

# k8s readiness/liveness probe + Prometheus 메트릭 노출 (전 프로필 공통)
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    export:
      otlp:
        enabled: false   # 로컬/compose 기본 off — Tempo 없으면 export 실패가 반복 로깅됨(k8s ConfigMap에서 true로 override)

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/openat
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  kafka:
    bootstrap-servers: localhost:29092

openai:
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  api-key: ${OPENAI_API_KEY:${OPEN_API_KEY:}}
  chat:
    enabled: true
    model: gpt-5.4-mini
  embedding:
    enabled: true
    model: text-embedding-3-small
  image-analysis:
    model: gpt-5.4-nano
  image:
    model: gpt-image-1-mini

---
spring:
  config:
    activate:
      on-profile: compose
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_BROKER}
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS}

# 배포 환경은 환경변수로만 제어한다. embedding.enabled 기본값은 false라
# OPENAI_EMBEDDING_ENABLED=true를 설정해야 상품 임베딩·벡터 검색이 켜진다.
openai:
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  api-key: ${OPENAI_API_KEY:${OPEN_API_KEY:}}
  embedding:
    enabled: ${OPENAI_EMBEDDING_ENABLED:false}

