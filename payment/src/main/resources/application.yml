server:
  port: 9130

spring:
  profiles:
    active: local
  application:
    name: payment-service
  jpa:
    properties:
      hibernate:
        default_schema: payment # 스키마 분리
    hibernate:
      ddl-auto: validate
  flyway:
    schemas: payment # flyway_schema_history도 payment 스키마 안에 생성
    locations: classpath:db/migration
  kafka:
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
payment:
  encryption:
    key: ${PAYMENT_FIELD_ENCRYPTION_KEY} # pgPaymentKey/pgRefundKey AES-GCM 키(Base64, 32바이트) — .env/docker-compose 쪽 값 추가 필요(dev-infra)
pg:
  secret-key: ${PG_SECRET_KEY} # 웹훅 HMAC-SHA256 서명 검증용 공유 비밀키(.env/docker-compose — dev-infra A12)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method