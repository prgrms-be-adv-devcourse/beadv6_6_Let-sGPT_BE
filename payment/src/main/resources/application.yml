server:
  port: 9130
  tomcat:
    mbeanregistry:
      enabled: true   # tomcat_threads_* 메트릭(Micrometer TomcatMetrics) 노출에 필요

spring:
  profiles:
    active: local
  application:
    name: payment-service
  jpa:
    properties:
      hibernate:
        default_schema: payment # 스키마 분리
    hibernate:
      ddl-auto: validate
  flyway:
    schemas: payment # flyway_schema_history도 payment 스키마 안에 생성
    locations: classpath:db/migration
  kafka:
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
payment:
  encryption:
    key: ${PAYMENT_FIELD_ENCRYPTION_KEY} # pgPaymentKey/pgRefundKey AES-GCM 키(Base64, 32바이트) — .env/docker-compose 쪽 값 추가 필요(dev-infra)
pg:
  secret-key: ${PG_SECRET_KEY} # 토스 API Basic Auth용 시크릿 키(TossClientConfig) — 웹훅 서명검증은 2026-06-24 제거됨
  # 부하테스트 전용 오버라이드. 프로덕션은 미설정(기본값 = 실 토스)이 정상이며 ENV_SECRETS에 넣지 않는다.
  # 주입은 loadtest/scripts/pg-mock-on.sh 의 kubectl set env 만이 유일 경로, off.sh 가 제거.
  base-url: ${PG_BASE_URL:https://api.tosspayments.com}

# 아웃바운드 회복탄력성 튜닝값(ResilienceConfig) — env 외부화 + 코드 기본값(재컴파일 없는 rollout).
# 윈도우 크기(10)·최소호출수(5) 같은 구조 파라미터는 코드 고정(튜닝 대상 아님).
toss:
  cb:
    failure-rate: ${TOSS_CB_FAILURE_RATE:50} # 실패율 임계치(%)
    slow-call-ms: ${TOSS_CB_SLOW_CALL_MS:3000} # 느린 호출 판정 시간
    wait-open-s: ${TOSS_CB_WAIT_OPEN_S:10} # open 유지 시간
  rl:
    permits-per-sec: ${TOSS_RL_PERMITS_PER_SEC:10} # 초당 허용 호출 수(인스턴스별 정적 분할)
    timeout-ms: ${TOSS_RL_TIMEOUT_MS:500} # 허가 대기 타임아웃
  retry:
    max-attempts: ${TOSS_RT_MAX_ATTEMPTS:2} # confirm 네트워크 오류 시 총 시도 횟수(원호출 1 + 재시도 1)
    wait-ms: ${TOSS_RT_WAIT_MS:200} # 재시도 사이 대기 시간
order:
  cb:
    slow-call-ms: ${ORDER_CB_SLOW_CALL_MS:1500} # 주문검증 read 2s에 맞춘 느린 호출 판정 시간


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    # 스웨거 UI 내부에서 API를 호출할 때 프리픽스로 /payment를 무조건 붙여서 쏘도록 강제
    #config-url: /payment/v3/api-docs/swagger-config
    #disable-swagger-default-url: true

# k8s readiness/liveness probe + Prometheus 메트릭 노출 (전 프로필 공통)
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true   # k8s 밖(local/compose)에서도 /actuator/health/readiness·liveness 활성화
  tracing:
    export:
      otlp:
        enabled: false   # 로컬/compose 기본 off — Tempo 없으면 export 실패가 반복 로깅됨(k8s ConfigMap에서 true로 override)
