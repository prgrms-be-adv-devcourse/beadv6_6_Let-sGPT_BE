spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/openat
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  kafka:
    bootstrap-servers: localhost:29092

pg:
  # .env에 토스 테스트 키가 있으면 실 토스 연동, 없으면 dummy로 부팅만 됨(결제 시도 시 토스가 401 거절).
  # 스텁 PG 클라이언트는 2026-07-17 제거 — local도 compose와 동일하게 RealTossPaymentClient가 뜬다.
  secret-key: ${PG_SECRET_KEY:localtest-dummy}

services:
  member:
    url: http://localhost:9100
  product:
    url: http://localhost:9110
  order:
    url: http://localhost:9120
  settlement:
    url: http://localhost:9140
