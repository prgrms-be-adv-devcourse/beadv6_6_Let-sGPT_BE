version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: local-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: local-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9092,EXTERNAL://localhost:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_HEAP_OPTS: "-Xms350M -Xmx500M"
    deploy:
      resources:
        limits:
          memory: 700M

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.5
    container_name: local-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    deploy:
      resources:
        limits:
          memory: 1000M
    restart: always

  redis:
    image: redis:7-alpine
    container_name: local-redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 1000M
    restart: always

  # Redis 데이터를 swagger-ui처럼 브라우저에서 클릭해서 보기 위한 웹 UI.
  # 인프라 컨테이너로 분류해서 1번 묶음(postgres/kafka/redis)에 같이 둠 - 필요할 때만 같이 띄우면 됨.
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: local-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: always

  # Kafka 토픽/컨슈머 그룹/메시지를 브라우저에서 확인하기 위한 웹 UI(redis-commander와 같은 취지).
  # 같은 compose 네트워크 안이라 내부 리스너(kafka:9092)로 접속 — 브로커의 EXTERNAL 리스너(29092,
  # 호스트에서 bootRun하는 서비스용)와는 별개.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: local-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    depends_on:
      - kafka
    restart: always

volumes:
  pgdata:
