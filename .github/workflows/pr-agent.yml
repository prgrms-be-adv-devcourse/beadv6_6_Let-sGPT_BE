name: PR-Agent

# AI PR 리뷰(Qodo PR-Agent, 오픈소스). PR diff에 리뷰 코멘트를 달기 때문에
# push가 아니라 pull_request 트리거여야 의미가 있다(브랜치 push엔 리뷰할 PR이 없음).
#
# ── 백엔드: 자체 추론 서버 (docs/INFERENCE_SERVER.md, OpenAI 호환, 무과금) ──
# 실행 조건: 리포 변수 vars.PR_AGENT_ENABLED == 'true' + 시크릿 INFERENCE_API_KEY 등록.
# 모델은 실제 모델명이 아닌 서버 별칭 `chat` 사용(별칭↔모델 매핑은 서버가 소유).
# 리뷰 초점(결제 도메인 위험요소)은 리포 루트 `.pr_agent.toml`의 extra_instructions로 지시.
on:
  pull_request:
    branches: [main, dev]    # main·dev 대상 PR 자동 리뷰 (자체 서버 무과금이라 dev도 포함)
    types: [opened, reopened, ready_for_review, synchronize]  # (임시) synchronize는 디버깅용 — 원인 파악 후 제거
  issue_comment:
    types: [created]         # 수동 /review·/improve (사람이 명시적으로 칠 때만, 드묾)

jobs:
  pr_agent:
    # 활성 조건 + 비용 남용 방지: issue_comment(수동 명령)는 협업자(OWNER/MEMBER/COLLABORATOR)만.
    # (fork PR은 GitHub 기본정책상 시크릿이 전달되지 않아 자동 차단됨 — pull_request_target 안 씀)
    if: >-
      ${{ vars.PR_AGENT_ENABLED == 'true'
          && github.event.sender.type != 'Bot'
          && (github.event_name != 'issue_comment'
              || contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      # (임시 디버그) Actions 러너에서 추론 서버 도달성·인증 사전점검.
      # LLM 호출이 "Your request was blocked."로 실패해 네트워크/WAF 차단 여부를 분리 진단.
      - name: 추론서버 연결 사전점검
        env:
          INFERENCE_API_KEY: ${{ secrets.INFERENCE_API_KEY }}
        run: |
          # 케이스 매트릭스: litellm 요청과 curl 요청의 차이(UA, SDK 헤더, body 필드, 프롬프트 길이/내용)를
          # 하나씩 재현해 어떤 요소가 "Your request was blocked."를 유발하는지 이분탐색.
          URL=https://api.inferway.xyz/v1/chat/completions
          AUTH="Authorization: Bearer ${INFERENCE_API_KEY}"
          run_case() {
            local name="$1"; shift
            local body="$1"; shift
            echo "=== CASE: $name ==="
            curl -sS -o /tmp/case.out -w "http_code=%{http_code}\n" \
              -H "$AUTH" -H "Content-Type: application/json" "$@" \
              -d "$body" "$URL" || true
            head -c 200 /tmp/case.out; echo
          }
          MIN='{"model":"chat","messages":[{"role":"user","content":"ping"}]}'
          run_case "baseline(curl UA, 최소 body)" "$MIN"
          run_case "UA=python-httpx" "$MIN" -A "python-httpx/0.27.2"
          run_case "UA=OpenAI SDK + x-stainless 헤더" "$MIN" \
            -A "OpenAI/Python 1.40.0" \
            -H "x-stainless-lang: python" -H "x-stainless-package-version: 1.40.0" \
            -H "x-stainless-os: Linux" -H "x-stainless-arch: x64" \
            -H "x-stainless-runtime: CPython" -H "x-stainless-runtime-version: 3.12.0"
          run_case "body에 temperature 추가" '{"model":"chat","messages":[{"role":"user","content":"ping"}],"temperature":0.2}'
          run_case "body에 stream:false 추가" '{"model":"chat","messages":[{"role":"user","content":"ping"}],"stream":false}'
          python3 - <<'EOF'
          import json
          long_text = "lorem ipsum " * 2000
          body = {"model":"chat","messages":[{"role":"system","content":long_text},{"role":"user","content":"ping"}]}
          open("/tmp/long.json","w").write(json.dumps(body))
          diff_text = "## File: 'a.java'\n@@ -1,3 +1,3 @@\n+String q = \"SELECT * FROM users WHERE id=\" + id;\n" * 50
          body2 = {"model":"chat","messages":[{"role":"system","content":"You are PR-Reviewer."},{"role":"user","content":diff_text}],"temperature":0.2}
          open("/tmp/diffish.json","w").write(json.dumps(body2))
          EOF
          echo "=== CASE: 긴 프롬프트(~24KB) ==="
          curl -sS -o /tmp/case.out -w "http_code=%{http_code}\n" -H "$AUTH" -H "Content-Type: application/json" --data @/tmp/long.json "$URL" || true
          head -c 200 /tmp/case.out; echo
          echo "=== CASE: diff 유사 내용(SQL 문자열 포함) + temperature ==="
          curl -sS -o /tmp/case.out -w "http_code=%{http_code}\n" -H "$AUTH" -H "Content-Type: application/json" --data @/tmp/diffish.json "$URL" || true
          head -c 200 /tmp/case.out; echo

      - uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── 백엔드: 자체 추론 서버 (pr-agent 공식 규칙 = 이중 언더스코어 env) ──
          # litellm이 미등록 모델명("chat")의 provider를 추론하지 못하므로 "openai/" 접두어로
          # OpenAI 호환 라우팅을 강제한다. 실제 요청 모델명은 접두어 뗀 "chat"(서버 별칭).
          CONFIG__MODEL: "openai/chat"
          CONFIG__FALLBACK_MODELS: '["openai/chat"]'
          # litellm 미등록 모델은 토큰 한도를 모른다 — 명시 안 하면 pr-agent가 기동 실패.
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "32000"
          OPENAI__API_BASE: "https://api.inferway.xyz/v1"     # 자체 서버 OpenAI호환 엔드포인트 (/v1 포함, INFERENCE_SERVER.md §3)
          # ⚠️ 추론 서버 관리자에게 발급받은 활성 키여야 함. 시크릿 값이 비어 있으면
          #    pr-agent가 placeholder dummy_key로 폴백해 401이 난다.
          OPENAI__KEY: ${{ secrets.INFERENCE_API_KEY }}
          # (임시 디버그) LLM 호출 실패가 로그에 안 남아 원인 확인용 — 원인 파악 후 제거
          CONFIG__VERBOSITY_LEVEL: "2"
          LITELLM__DEBUG: "true"
