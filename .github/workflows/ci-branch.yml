name: CI (feature branch)

# dev/main이 아닌 모든 브랜치 push에서 작동. 브랜치 이름과 무관하게 실제
# 바뀐 도메인 폴더만 단독 빌드 — common이 같이 바뀌어도 5개로 확장하지
# 않음(그건 ci-merge.yml이 실제 머지된 트리 기준으로 다시 검증하는
# 영역이라 여기서 선반영하면 중복/느려짐). common만 단독으로 바뀐
# 브랜치는 매트릭스가 비어 build 잡 자체가 스킵됨(의도된 동작).
# 머지 전 단독 컴파일 검증 목적이라 이미지 빌드/푸시는 하지 않음(publish는 ci-merge.yml에서).
on:
  push:
    branches-ignore: [dev, main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            apigateway: ['**/apigateway/**']
            member: ['**/member/**']
            order: ['**/order/**']
            payment: ['**/payment/**']
            product: ['**/product/**']
            settlement: ['**/settlement/**']
            search: ['**/search/**']
            queue: ['**/queue/**']

      - name: Resolve build matrix
        id: set-matrix
        run: echo 'matrix=${{ steps.filter.outputs.changes }}' >> "$GITHUB_OUTPUT"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Spotless ratchetFrom(origin/dev) 비교용 전체 히스토리

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 포맷 검사(비차단). 팀 컨벤션 합의 후 continue-on-error 제거 → 차단 전환.
      - name: Spotless (${{ matrix.service }}, non-blocking)
        continue-on-error: true
        run: |
          git fetch --no-tags origin dev:refs/remotes/origin/dev || true
          ./gradlew :${{ matrix.service }}:spotlessCheck

      - name: Build ${{ matrix.service }}
        env:
          SPRING_PROFILES_ACTIVE: compose
          DB_HOST: ${{ fromJson(vars.CI_VARS).DB_HOST }}
          DB_PORT: ${{ fromJson(vars.CI_VARS).DB_PORT }}
          DB_NAME: ${{ fromJson(vars.CI_VARS).DB_NAME }}
          DB_USER: ${{ fromJson(vars.CI_VARS).DB_USER }}
          DB_PASSWORD: ${{ fromJson(vars.CI_VARS).DB_PASSWORD }}
          KAFKA_BROKER: ${{ fromJson(vars.CI_VARS).KAFKA_BROKER }}
          REDIS_HOST: ${{ fromJson(vars.CI_VARS).REDIS_HOST }}
          REDIS_PORT: ${{ fromJson(vars.CI_VARS).REDIS_PORT }}
        run: ./gradlew :${{ matrix.service }}:build -x spotlessCheck    # 빌드는 포맷으로 안 깨지게(비차단)

  # ArgoCD 설치 매니페스트 렌더 산출물(k8s/argocd/argocd-install.yaml)을 값(helm/values.yaml)에서
  # 자동 생성해 같은 피처브랜치에 커밋백한다(k3s_memory_mitigation_plan §9-12 C안 / §9-13 교정).
  # 머지 전(피처브랜치)에 산출물을 확정해 두므로 main 은 항상 values↔산출물이 일치한 상태로 착지 —
  # main push 에 커밋백할 때 생기는 루프/브랜치보호 문제를 회피한다. 커밋에 [skip ci] 를 달아
  # 재렌더(무변경) 실행을 건너뛴다(방금 렌더한 결과라 재렌더 diff 는 어차피 없음).
  render-argocd:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 렌더 산출물을 피처브랜치에 커밋백
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # helm/values.yaml 또는 커밋된 산출물이 바뀐 push 에서만 렌더/커밋(그 외엔 잡 스킵).
      - uses: dorny/paths-filter@v3
        id: argofilter
        with:
          filters: |
            argocd: ['k8s/argocd/helm/**', 'k8s/argocd/argocd-install.yaml']

      - name: Install helm
        if: steps.argofilter.outputs.argocd == 'true'
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4    # 렌더 산출물 바이트 동일성 위해 버전 핀(로컬 렌더와 동일)

      - name: Install pyyaml
        if: steps.argofilter.outputs.argocd == 'true'
        run: pip install pyyaml==6.0.3

      - name: Render argocd-install.yaml from values
        if: steps.argofilter.outputs.argocd == 'true'
        run: bash k8s/argocd/helm/render.sh

      - name: Commit back if changed
        if: steps.argofilter.outputs.argocd == 'true'
        run: |
          if git diff --quiet -- k8s/argocd/argocd-install.yaml; then
            echo "산출물 최신 — 커밋 없음"
          else
            git config user.name "deploy-bot"
            git config user.email "deploy-bot@users.noreply.github.com"
            git add k8s/argocd/argocd-install.yaml
            git commit -m "chore(argocd): render argocd-install.yaml from values.yaml [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
