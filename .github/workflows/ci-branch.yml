name: CI (feature branch)

# dev/main이 아닌 모든 브랜치 push에서 작동. 브랜치 이름과 무관하게 실제
# 바뀐 도메인 폴더만 단독 빌드 — common이 같이 바뀌어도 5개로 확장하지
# 않음(그건 ci-merge.yml이 실제 머지된 트리 기준으로 다시 검증하는
# 영역이라 여기서 선반영하면 중복/느려짐). common만 단독으로 바뀐
# 브랜치는 매트릭스가 비어 build 잡 자체가 스킵됨(의도된 동작).
# 머지 전 단독 컴파일 검증 목적이라 이미지 빌드/푸시는 하지 않음(publish는 ci-merge.yml에서).
on:
  push:
    branches-ignore: [dev, main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            apigateway: ['**/apigateway/**']
            member: ['**/member/**']
            order: ['**/order/**']
            payment: ['**/payment/**']
            product: ['**/product/**']
            settlement: ['**/settlement/**']
            search: ['**/search/**']
            ai: ['**/ai/**']
            queue: ['**/queue/**']

      - name: Resolve build matrix
        id: set-matrix
        run: echo 'matrix=${{ steps.filter.outputs.changes }}' >> "$GITHUB_OUTPUT"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Spotless ratchetFrom(origin/dev) 비교용 전체 히스토리

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 포맷 검사(비차단). 팀 컨벤션 합의 후 continue-on-error 제거 → 차단 전환.
      - name: Spotless (${{ matrix.service }}, non-blocking)
        continue-on-error: true
        run: |
          git fetch --no-tags origin dev:refs/remotes/origin/dev || true
          ./gradlew :${{ matrix.service }}:spotlessCheck

      - name: Build ${{ matrix.service }}
        env:
          SPRING_PROFILES_ACTIVE: compose
          DB_HOST: ${{ fromJson(vars.CI_VARS).DB_HOST }}
          DB_PORT: ${{ fromJson(vars.CI_VARS).DB_PORT }}
          DB_NAME: ${{ fromJson(vars.CI_VARS).DB_NAME }}
          DB_USER: ${{ fromJson(vars.CI_VARS).DB_USER }}
          DB_PASSWORD: ${{ fromJson(vars.CI_VARS).DB_PASSWORD }}
          KAFKA_BROKER: ${{ fromJson(vars.CI_VARS).KAFKA_BROKER }}
          REDIS_HOST: ${{ fromJson(vars.CI_VARS).REDIS_HOST }}
          REDIS_PORT: ${{ fromJson(vars.CI_VARS).REDIS_PORT }}
        run: ./gradlew :${{ matrix.service }}:build -x spotlessCheck    # 빌드는 포맷으로 안 깨지게(비차단)

  # ArgoCD 설치 매니페스트(k8s/argocd/argocd-install.yaml)는 직접 관리 파일(helm 안 씀, 7-14
  # argocd_helm_removal_plan 근거) — 렌더/커밋백 없음. 대신 kustomize build 가 에러 없이 되는지만
  # 검증해 문법 오류를 머지 전에 잡는다("실패는 시끄럽게" 원칙, PR #89류 사고 조기 발견 목적).
  validate-argocd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # k8s/argocd/ 아래 아무 파일이나 바뀐 push 에서만 검증(그 외엔 잡 스킵).
      - uses: dorny/paths-filter@v3
        id: argofilter
        with:
          filters: |
            argocd: ['k8s/argocd/**']

      - name: Ensure kustomize CLI
        if: steps.argofilter.outputs.argocd == 'true'
        run: |
          if ! command -v kustomize >/dev/null 2>&1; then
            mkdir -p "$RUNNER_TEMP/bin"
            ( cd "$RUNNER_TEMP/bin" && curl -sfL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash )
            echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          fi

      - name: kustomize build dry-run
        if: steps.argofilter.outputs.argocd == 'true'
        run: kustomize build k8s/argocd/ > /dev/null

  # 관측 스택(k8s/observability)은 설정 CM(tempo/prometheus/otel-collector/grafana
  # datasources·providers)을 configMapGenerator 로 묶어, 내용 해시가 붙은 ConfigMap
  # 이름이 각 파드 볼륨 참조로 자동 전파된다(대시보드 JSON CM 은 라이브 리로드 위해 제외).
  # 이 전파는 kustomize 렌더 불변식이라 렌더가 깨지지 않으면 참조 정합이 보장된다. 따라서
  # 별도 전용 테스트 없이 (1) kustomize 렌더 성공, (2) 대시보드 JSON/uid/4중 정합만 검증한다.
  validate-observability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 관측 매니페스트·오버레이·검증 스크립트가 바뀐 push 에서만 검증(그 외엔 스킵).
      - uses: dorny/paths-filter@v3
        id: obsfilter
        with:
          filters: |
            observability:
              - 'k8s/observability/**'
              - 'k8s/base/**'
              - 'k8s/overlay/**'
              - 'scripts/validate-observability.sh'

      - name: Ensure kustomize CLI
        if: steps.obsfilter.outputs.observability == 'true'
        run: |
          if ! command -v kustomize >/dev/null 2>&1; then
            mkdir -p "$RUNNER_TEMP/bin"
            ( cd "$RUNNER_TEMP/bin" && curl -sfL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash )
            echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          fi

      # 렌더 깨짐/누락파일/키불일치를 머지 전에 차단. observability 는 필수,
      # overlay 는 로컬 렌더가 깨끗해 함께 검증한다.
      - name: kustomize build dry-run (observability + overlay)
        if: steps.obsfilter.outputs.observability == 'true'
        run: |
          kustomize build k8s/observability > /dev/null
          kustomize build k8s/overlay > /dev/null

      - uses: actions/setup-python@v5
        if: steps.obsfilter.outputs.observability == 'true'
        with:
          python-version: '3.11'

      - name: Install PyYAML
        if: steps.obsfilter.outputs.observability == 'true'
        run: pip install pyyaml

      # 대시보드 JSON 파싱 + uid 중복 없음 + provider/volumeMount/volume.configMap/CM 4중 정합.
      - name: Validate observability manifests
        if: steps.obsfilter.outputs.observability == 'true'
        run: scripts/validate-observability.sh
