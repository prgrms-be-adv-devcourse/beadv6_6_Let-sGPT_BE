name: CI

on:
  push:
    branches: [dev, main]

env:
  REGISTRY: ghcr.io

jobs:
  # 어떤 모듈 폴더가 바뀌었는지 감지해서 빌드 매트릭스를 동적으로 결정
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      k8s_changed: ${{ steps.k8sfilter.outputs.k8s }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            apigateway: ['**/apigateway/**']
            common: ['**/common/**', 'build.gradle.kts', 'settings.gradle.kts']
            member: ['**/member/**']
            order: ['**/order/**']
            payment: ['**/payment/**']
            product: ['**/product/**']
            settlement: ['**/settlement/**']
            search: ['**/search/**']

      # 매니페스트(k8s/**) 변경은 "빌드 매트릭스"와 분리해 감지한다 — 이건 빌드 대상이 아니라
      # deploy/state(GitOps desired-state) 전파 트리거이기 때문. 위 filter에 같이 넣으면
      # changes 목록에 'k8s'가 섞여 매트릭스가 그걸 서비스로 오인해 빌드하려다 깨진다(Q100 갭 수정,
      # plan 7-11-gitops_manifest_propagation §2). deploy.yml이 이 플래그로 매니페스트-only
      # 변경도 deploy/state에 merge+push 하도록 판단한다.
      - uses: dorny/paths-filter@v3
        id: k8sfilter
        with:
          filters: |
            k8s: ['k8s/**']

      # common(또는 루트 빌드 설정)이 바뀌면 전 모듈에 영향이 가므로 5개 다 빌드,
      # 그 외에는 실제로 변경된 모듈 폴더만 매트릭스에 세팅. dev/main 동일 로직 —
      # main에서는 이 매트릭스가 곧 "마지막 배포 이후 실제로 바뀐 도메인" 목록이라
      # deploy.yml이 그 도메인만 선택적으로 재기동하는 데 그대로 쓰인다(plan.md §L).
      - name: Resolve build matrix
        id: set-matrix
        run: |
          if [ "${{ steps.filter.outputs.common }}" = "true" ]; then
            echo 'matrix=["apigateway","member","order","payment","product","settlement","search"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=${{ steps.filter.outputs.changes }}' >> "$GITHUB_OUTPUT"
          fi

      # main의 매트릭스 + 매니페스트 변경 플래그를 CD(deploy.yml)에 전달 — dev는 배포 대상 아니라 불필요.
      # deploy-k8s.txt: k8s/** 변경 여부(true/false). 매트릭스가 []여도 이 값이 true면 deploy.yml이
      # deploy/state에 매니페스트 merge+push를 수행한다(Q100 갭 수정).
      - name: Export deploy metadata for CD (main only)
        if: github.ref_name == 'main'
        run: |
          echo '${{ steps.set-matrix.outputs.matrix }}' > deploy-matrix.json
          echo '${{ steps.k8sfilter.outputs.k8s }}' > deploy-k8s.txt

      - uses: actions/upload-artifact@v4
        if: github.ref_name == 'main'
        with:
          name: deploy-matrix
          path: |
            deploy-matrix.json
            deploy-k8s.txt
          retention-days: 1

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # GHCR push 권한 (GITHUB_TOKEN으로 자동 인증)

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Spotless ratchetFrom(origin/dev) 비교용 전체 히스토리

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 포맷 검사(비차단). 팀 컨벤션 합의 후 continue-on-error 제거 → 차단 전환.
      - name: Spotless (${{ matrix.service }}, non-blocking)
        continue-on-error: true
        run: |
          git fetch --no-tags origin dev:refs/remotes/origin/dev || true
          ./gradlew :${{ matrix.service }}:spotlessCheck

      # member/order/payment/product/settlement는 루트 멀티모듈 빌드의 서브프로젝트라
      # 각자 gradlew가 없으므로 루트 wrapper로 해당 서브프로젝트만 빌드.
      # 아직 테스트 코드가 없어 실제 DB/Kafka/Redis 연결은 일어나지 않는다 - 여기서는
      # compose 프로필의 ${...} placeholder가 풀리지 않아 빌드가 깨지는 것만 방지하면 된다.
      # 실제 인프라 연동 검증은 k3s(k8s/) 배포 후 스모크(scripts/smoke-drop-order.sh)에서 수행.
      - name: Build ${{ matrix.service }}
        env:
          SPRING_PROFILES_ACTIVE: compose
          DB_HOST: ${{ fromJson(vars.CI_VARS).DB_HOST }}
          DB_PORT: ${{ fromJson(vars.CI_VARS).DB_PORT }}
          DB_NAME: ${{ fromJson(vars.CI_VARS).DB_NAME }}
          DB_USER: ${{ fromJson(vars.CI_VARS).DB_USER }}
          DB_PASSWORD: ${{ fromJson(vars.CI_VARS).DB_PASSWORD }}
          KAFKA_BROKER: ${{ fromJson(vars.CI_VARS).KAFKA_BROKER }}
          REDIS_HOST: ${{ fromJson(vars.CI_VARS).REDIS_HOST }}
          REDIS_PORT: ${{ fromJson(vars.CI_VARS).REDIS_PORT }}
        run: ./gradlew :${{ matrix.service }}:build -x spotlessCheck    # 빌드는 포맷으로 안 깨지게(비차단)

      - uses: docker/setup-buildx-action@v3

      # GHCR 로그인
      # username: 워크플로를 실행한 GitHub 계정명 (개인 토큰 불필요)
      # password: GITHUB_TOKEN - 저장소에 자동으로 주입되는 토큰, 별도 설정 없음
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR 이미지 이름은 소문자만 허용 → 저장소 경로를 소문자로 변환
      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME=$(echo '${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
