name: Security Scan (Snyk)

# PR마다 돌리지 않는다(과함) — 주 2회 정기 스캔 + 수동 실행.
# 의존성 취약점(SCA)과 코드 정적분석(SAST)을 전체 코드베이스에 대해 훑는다.
# 비차단(continue-on-error) 시작 → 안정화되면 차단 전환 고려.
# 선행 조건: 리포 시크릿 `SNYK_TOKEN`(무료 플랜 발급). 없으면 auth 실패하지만 job은 녹색 유지.
on:
  schedule:
    - cron: "0 0 * * 1"   # 매주 월 00:00 UTC = 09:00 KST
    - cron: "0 0 * * 4"   # 매주 목 00:00 UTC = 09:00 KST
  workflow_dispatch:       # 필요 시 수동 실행

jobs:
  snyk:
    runs-on: ubuntu-latest
    continue-on-error: true      # 비차단: 취약점 발견돼도 워크플로는 실패로 안 만든다(경고만)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: snyk/actions/setup@master

      - name: Snyk SCA (의존성 취약점)
        continue-on-error: true
        run: snyk test --all-projects --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code (SAST)
        continue-on-error: true
        run: snyk code test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
