name: CI

on:
  push:
    branches: [dev]

env:
  REGISTRY: ghcr.io

jobs:
  # 어떤 모듈 폴더가 바뀌었는지 감지해서 빌드 매트릭스를 동적으로 결정
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            common: ['common/**', 'build.gradle.kts', 'settings.gradle.kts']
            member: ['member/**']
            order: ['order/**']
            payment: ['payment/**']
            product: ['product/**']
            settlement: ['settlement/**']

      # common(또는 루트 빌드 설정)이 바뀌면 전 모듈에 영향이 가므로 5개 다 빌드,
      # 그 외에는 실제로 변경된 모듈 폴더만 매트릭스에 세팅
      - name: Resolve build matrix
        id: set-matrix
        run: |
          if [ "${{ steps.filter.outputs.common }}" = "true" ]; then
            echo 'matrix=["member","order","payment","product","settlement"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=${{ steps.filter.outputs.changes }}' >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # GHCR push 권한 (GITHUB_TOKEN으로 자동 인증)

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # member/order/payment/product/settlement는 루트 멀티모듈 빌드의 서브프로젝트라
      # 각자 gradlew가 없으므로 루트 wrapper로 해당 서브프로젝트만 빌드.
      # 아직 테스트 코드가 없어 실제 DB/Kafka/Redis 연결은 일어나지 않는다 - 여기서는
      # compose 프로필의 ${...} placeholder가 풀리지 않아 빌드가 깨지는 것만 방지하면 된다.
      # 실제 인프라 연동 검증은 docker-compose.full.yml(2번, Local Full Stack)에서 수행.
      - name: Build ${{ matrix.service }}
        env:
          SPRING_PROFILES_ACTIVE: compose
          DB_HOST: ${{ fromJson(vars.CI_VARS).DB_HOST }}
          DB_PORT: ${{ fromJson(vars.CI_VARS).DB_PORT }}
          DB_NAME: ${{ fromJson(vars.CI_VARS).DB_NAME }}
          DB_USER: ${{ fromJson(vars.CI_VARS).DB_USER }}
          DB_PASSWORD: ${{ fromJson(vars.CI_VARS).DB_PASSWORD }}
          KAFKA_BROKER: ${{ fromJson(vars.CI_VARS).KAFKA_BROKER }}
          REDIS_HOST: ${{ fromJson(vars.CI_VARS).REDIS_HOST }}
          REDIS_PORT: ${{ fromJson(vars.CI_VARS).REDIS_PORT }}
        run: ./gradlew :${{ matrix.service }}:build

      - uses: docker/setup-buildx-action@v3

      # GHCR 로그인
      # username: 워크플로를 실행한 GitHub 계정명 (개인 토큰 불필요)
      # password: GITHUB_TOKEN - 저장소에 자동으로 주입되는 토큰, 별도 설정 없음
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR 이미지 이름은 소문자만 허용 → 저장소 경로를 소문자로 변환
      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME=$(echo '${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
