name: CD-ColdStart

# 최초 콜드 배포용(1회성). main 브랜치 보호를 우회하려고 임시 브랜치 push로 트리거한다.
# 러너(self-hosted, ec2-deploy)의 자동 GITHUB_TOKEN으로 GHCR private 이미지를 pull하므로
# PAT가 전혀 필요 없다. FE(nginx) 이미지는 박스에 미리 docker load 돼 있어 pull하지 않는다.
# 배포 성공 후 이 파일/브랜치는 삭제한다(상시 배포는 deploy.yml 사용).
on:
  push:
    branches: ['deploy/cold-start']

permissions:
  contents: read
  packages: read

jobs:
  cold-deploy:
    runs-on: [self-hosted, ec2-deploy]
    steps:
      - uses: actions/checkout@v4

      - name: GHCR login (자동 토큰 → same-repo private pull, PAT 불필요)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Render .env from ENV_SECRETS (+ GHCR repo 소문자 보정)
        env:
          ENV_SECRETS: ${{ secrets.ENV_SECRETS }}
        run: |
          echo "$ENV_SECRETS" | jq -r 'to_entries[] | "\(.key)=\(.value)"' > .env
          # GHCR는 소문자만 허용 → 이미지 경로용 repo 이름을 소문자로 강제(마지막 값이 우선).
          echo "GITHUB_REPOSITORY=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> .env

      - name: Compose up (BE pull + 전체 기동, FE는 박스 로컬 이미지 사용)
        run: |
          docker compose -f docker-compose.dev.yml --env-file .env pull \
            postgres kafka redis apigateway member product order payment settlement
          docker compose -f docker-compose.dev.yml --env-file .env up -d
          docker image prune -f

      - name: Health check (nginx 정적 + 컨테이너 상태)
        run: |
          echo "=== docker ps ==="
          docker ps --format '{{.Names}}\t{{.Status}}'
          echo "=== curl http://localhost/ ==="
          for i in $(seq 1 18); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/ || true)
            echo "attempt $i: http=$code"
            [ "$code" = "200" ] && break
            sleep 5
          done
