name: CD

# CI(이미지 빌드/푸시)가 main 브랜치(머지)에서 성공적으로 끝났을 때만 배포 트리거.
# dev는 각자 로컬 스택(1번)에서 돌리고, EC2 배포는 main 머지 시점에만 일어난다.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  actions: read   # workflow_run 아티팩트(deploy-matrix) 조회

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    # self-hosted runner를 배포 대상 EC2 인스턴스에 직접 설치해서 그 위에서 돈다.
    # 보안그룹에 SSH 인바운드가 없어도(terraform security.tf) 러너는 outbound로
    # GitHub에 polling하므로 추가 인바운드 포트가 필요 없고, SSM/S3 경유/OIDC도
    # 전부 불필요해진다(잡이 이미 그 박스 위에서 실행되기 때문).
    runs-on: [self-hosted, ec2-deploy]
    steps:
      - uses: actions/checkout@v4

      # CI(ci.yml)가 main에서 계산한 "이번에 실제로 바뀐 도메인" 매트릭스를 받아옴.
      # docker-compose.dev.yml의 서비스명이 도메인명과 1:1 동일(member/order/
      # payment/product/settlement)하므로 그대로 docker compose의 서비스 인자로 쓴다.
      - name: Download changed-services matrix from CI run
        uses: actions/download-artifact@v4
        with:
          name: deploy-matrix
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve services to restart
        id: services
        run: |
          SERVICES=$(jq -r '. | join(" ")' deploy-matrix.json)
          echo "list=$SERVICES" >> "$GITHUB_OUTPUT"
          if [ -z "$SERVICES" ]; then
            echo "변경된 도메인이 없어 배포를 스킵합니다."
          else
            echo "재기동 대상: $SERVICES"
          fi

      # ENV_SECRETS(JSON 또는 KEY=VALUE) → .env 파일로 변환. 이 값만 실제 비밀(DB/Kafka/Redis
      # 자격증명)이라 secrets에 유지. 러너가 이미 이 박스에 있으니 전송 단계가 없다.
      - name: Render .env from ENV_SECRETS (+ GHCR repo 소문자 보정)
        if: steps.services.outputs.list != ''
        env:
          ENV_SECRETS: ${{ secrets.ENV_SECRETS }}
        run: |
          # ENV_SECRETS가 JSON 오브젝트면 to_entries로, 아니면(KEY=VALUE 줄 형식) 그대로 사용.
          if printf '%s' "$ENV_SECRETS" | jq -e 'type=="object"' >/dev/null 2>&1; then
            printf '%s' "$ENV_SECRETS" | jq -r 'to_entries[] | "\(.key)=\(.value)"' > .env
          else
            printf '%s\n' "$ENV_SECRETS" > .env
          fi
          # GHCR는 소문자만 허용. ENV_SECRETS의 (대문자) GITHUB_REPOSITORY를 제거하고
          # 소문자 값으로 재주입한다(docker compose는 --env-file 중복 시 first-wins라 삭제 필수).
          sed -i '/^GITHUB_REPOSITORY=/d' .env
          echo "GITHUB_REPOSITORY=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> .env

      # 변경된 도메인만 pull/재기동 — 나머지(postgres/kafka/redis, 변경 없는
      # 다른 도메인)는 그대로 유지. common이 바뀐 경우엔 매트릭스 자체가
      # 5개 전부라 의도적으로 전부 재기동됨.
      - name: docker compose pull & restart changed services
        if: steps.services.outputs.list != ''
        run: |
          # ⚠️ Actions가 GITHUB_REPOSITORY를 대문자로 자동 주입하고, docker compose는
          # shell 환경변수를 --env-file보다 우선한다 → 여기서 소문자로 override 필수.
          export GITHUB_REPOSITORY="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          SERVICES="${{ steps.services.outputs.list }}"
          docker compose -f docker-compose.dev.yml --env-file .env pull $SERVICES
          docker compose -f docker-compose.dev.yml --env-file .env up -d $SERVICES
          docker image prune -f
