name: CD

# CI(이미지 빌드/푸시)가 main 브랜치(머지)에서 성공적으로 끝났을 때만 배포 트리거.
# dev는 각자 로컬 스택에서 돌리고, EC2 배포는 main 머지 시점에만 일어난다.
#
# 배포 방식(2026-07-09 k3s 전환, 2026-07-09 ArgoCD 편입): docker compose → k3s → GitOps.
# 러너(self-hosted, ec2-deploy)는 서버 노드 위에서 돌며 k3s kubeconfig(644)에 접근 가능하다.
# 러너는 시크릿 적용 + Kustomize 이미지 SHA 핀 + deploy/state 커밋백까지만 수행하고,
# 실제 apply/rollout은 ArgoCD(k8s/argocd/, deploy/state를 watch)가 auto-sync로 수행한다.
# 러너는 마지막에 ArgoCD의 Synced/Healthy 수렴만 확인한다(plan argocd_ci_smoke_plan WS-C).
#
# GitOps: main은 PR 머지 전용이라 봇이 직접 push 못 함 → 이미지 pin 커밋백은 전용
# deploy/state 브랜치(비보호, 봇 전용)로 한다. 이 브랜치가 클러스터 desired-state의
# 단일 출처이며 ArgoCD의 watch 대상이다(plan k3s_deploy_automation §4-2).
# FE 리포는 자체 workflow_run 아티팩트가 없으므로 repository_dispatch(fe-image-built)로
# 별도 트리거 — client_payload.sha가 곧 이번에 핀할 프론트 이미지 태그.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  repository_dispatch:
    types: [fe-image-built]

permissions:
  contents: write   # deploy/state 브랜치에 이미지 pin 커밋백
  actions: read     # workflow_run 아티팩트(deploy-matrix) 조회

env:
  IMG_BASE: ghcr.io/prgrms-be-adv-devcourse/beadv6_6_let-sgpt_be
  FE_IMG: ghcr.io/prgrms-be-adv-devcourse/beadv6_6_let-sgpt_fe/frontend
  KUBECONFIG: /etc/rancher/k3s/k3s.yaml

jobs:
  deploy:
    if: github.event_name == 'repository_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, ec2-deploy]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # deploy/state 머지 위해 전체 히스토리 필요

      # 이벤트별로 "main에 merge할 SHA"와 "FE 핀 대상 SHA"가 다른 곳에서 옴 — 여기서 통일.
      - name: Resolve trigger context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "fe_sha=${{ github.event.client_payload.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "fe_sha=" >> "$GITHUB_OUTPUT"
          fi

      # CI가 main에서 계산한 "이번에 실제로 바뀐 도메인" 매트릭스. FE dispatch에는 없음.
      - name: Download changed-services matrix from CI run
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: deploy-matrix
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve services to deploy
        id: services
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SERVICES=$(jq -r '. | join(" ")' deploy-matrix.json)
            K8S_CHANGED=$(cat deploy-k8s.txt 2>/dev/null | tr -d '[:space:]' || echo false)
          else
            SERVICES=""
            K8S_CHANGED=false
          fi
          echo "list=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "k8s_changed=$K8S_CHANGED" >> "$GITHUB_OUTPUT"
          FE_SHA="${{ steps.ctx.outputs.fe_sha }}"
          if [ -z "$SERVICES" ] && [ "$K8S_CHANGED" != "true" ] && [ -z "$FE_SHA" ]; then
            echo "변경된 도메인/매니페스트/FE 이미지가 없어 배포를 스킵합니다."
          else
            echo "배포 대상 서비스: ${SERVICES:-(BE 이미지 변경 없음)} / 매니페스트(k8s/**) 변경: $K8S_CHANGED / FE SHA: ${FE_SHA:-(없음)}"
          fi

      # ENV_SECRETS(JSON 또는 KEY=VALUE) → .env. create-secrets.sh 입력.
      - name: Render .env from ENV_SECRETS
        if: steps.services.outputs.list != '' || steps.services.outputs.k8s_changed == 'true' || steps.ctx.outputs.fe_sha != ''
        env:
          ENV_SECRETS: ${{ secrets.ENV_SECRETS }}
        run: |
          if printf '%s' "$ENV_SECRETS" | jq -e 'type=="object"' >/dev/null 2>&1; then
            # @sh로 값을 셸 안전하게 단일따옴표 이스케이프 — 값에 ", $, 개행(PEM 등)이 있어도
            # .env를 깨지 않는다(create-secrets.sh가 `. "$ENV_FILE"`로 소싱하므로 필수).
            printf '%s' "$ENV_SECRETS" | jq -r 'to_entries[] | "\(.key)=\(.value | @sh)"' > .env
          elif printf '%s' "$ENV_SECRETS" | grep -q '^[[:space:]]*{'; then
            # { 로 시작하는데 위 jq 파싱은 실패한 경우 — 의도한 KEY=VALUE 포맷이 아니라
            # 깨진 JSON일 확률이 높다(스마트따옴표 자동변환 등). 원문을 그대로 .env에 흘려보내
            # bash 소싱 단계에서 알 수 없는 EOF/구문 에러로 죽게 두지 않고 여기서 바로 fail-loud.
            echo "ERROR: ENV_SECRETS가 { 로 시작해 JSON으로 보이지만 파싱 실패." >&2
            echo "  값에 이스케이프 안 된 \" 등으로 JSON이 깨졌을 가능성 — 리치텍스트 편집기" >&2
            echo "  (OneNote/Word/Notion 등)의 스마트따옴표 자동변환이 흔한 원인." >&2
            echo "  (원문은 시크릿이라 로그에 출력하지 않음 — GitHub Secrets 값 자체를 재확인할 것)" >&2
            exit 1
          else
            printf '%s\n' "$ENV_SECRETS" > .env
          fi

      # app-secrets + ghcr-pull(imagePullSecret) + default SA 부착 — 전부 멱등.
      # ghcr-pull을 매 배포 보장 → 노드 교체/신규 클러스터에서도 kubelet이 정석 pull(Q83-6).
      - name: Provision k8s secrets (idempotent)
        if: steps.services.outputs.list != '' || steps.services.outputs.k8s_changed == 'true' || steps.ctx.outputs.fe_sha != ''
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PULL_PAT }}
        run: |
          GHCR_USER="$GHCR_USER" GHCR_PAT="$GHCR_PAT" ./k8s/bootstrap/create-secrets.sh .env

      - name: Ensure kustomize CLI
        if: steps.services.outputs.list != '' || steps.ctx.outputs.fe_sha != ''
        run: |
          if ! command -v kustomize >/dev/null 2>&1; then
            mkdir -p "$RUNNER_TEMP/bin"
            ( cd "$RUNNER_TEMP/bin" && curl -sfL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash )
            echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          fi

      # deploy/state = openat 앱의 desired-state 단일 출처. 두 관심사를 분리한다(Q100 갭 수정):
      #  (1) main→deploy/state 구조 병합(merge)은 "항상" 수행 — 매니페스트(probe·sync-wave·configmap
      #      등) 변경을 이미지 재빌드 유무와 무관하게 전파해야 GitOps가 반쪽으로 죽지 않는다.
      #  (2) 이미지 SHA 핀 루프는 "실제 재빌드된 서비스가 있을 때만" — 매니페스트-only 변경이면 스킵.
      # 이전 구조는 (1)이 (2)와 한 스텝에 묶여, 이미지 변경이 없으면 merge/push 자체가 스킵됐다.
      - name: Sync deploy/state (merge main + pin changed images)
        id: pin
        if: steps.services.outputs.list != '' || steps.services.outputs.k8s_changed == 'true' || steps.ctx.outputs.fe_sha != ''
        env:
          SHA: ${{ steps.ctx.outputs.sha }}
          SVCS: ${{ steps.services.outputs.list }}
          FE_SHA: ${{ steps.ctx.outputs.fe_sha }}
        run: |
          git config user.name  "deploy-bot"
          git config user.email "deploy-bot@users.noreply.github.com"
          git fetch origin deploy/state || true
          git checkout deploy/state 2>/dev/null || git checkout -b deploy/state
          # main의 구조 변경(매니페스트 추가/삭제, probe, sync-wave, configmap 등)을 흡수.
          # 이미지 pin 충돌은 deploy/state 것 유지(-X ours). 매니페스트-only여도 이 merge로 전파된다.
          git merge -X ours --no-edit "$SHA"
          # BE 이미지 SHA 핀은 재빌드된 서비스가 있을 때만(매니페스트-only 변경이면 SVCS가 비어 스킵).
          if [ -n "$SVCS" ]; then
            for svc in $SVCS; do
              ( cd k8s/overlay && kustomize edit set image "$IMG_BASE/$svc=$IMG_BASE/$svc:$SHA" )
            done
            git add k8s/overlay/kustomization.yaml
            git commit -m "chore(deploy): pin $SVCS to $SHA [skip ci]" || echo "no image change to commit"
          fi
          # FE repository_dispatch로 넘어온 SHA 핀 — FE 리포 CI 완료 시에만 값이 있음.
          if [ -n "$FE_SHA" ]; then
            ( cd k8s/overlay && kustomize edit set image "$FE_IMG=$FE_IMG:$FE_SHA" )
            git add k8s/overlay/kustomization.yaml
            git commit -m "chore(deploy): pin frontend to $FE_SHA [skip ci]" || echo "no FE image change to commit"
          fi
          # merge가 새 커밋을 만들었으면(매니페스트 전파) 또는 핀 커밋이 있으면 push. 없으면 no-op이라
          # revision=현재 HEAD가 되고 아래 수렴확인이 즉시 통과한다.
          git push origin deploy/state
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # push된 deploy/state를 ArgoCD가 auto-sync — 러너는 apply 없이 수렴 확인만 한다
      # (도구 추가 없음, kubectl만 사용. 리서치 argocd_ci_smoke_research §3.8-A).
      # ArgoCD 기본 git 폴링 주기(3분)를 기다리면 방금 push한 revision을 아직 못 본 채
      # "이전 revision 기준 Synced/Healthy"를 그대로 참으로 오인할 수 있어(2026-07-09 실제
      # CD 1회차에서 재현 확인 — payment 파드가 갱신 안 된 채 convergence 스텝만 성공 처리됨),
      # ① hard refresh로 즉시 재조회를 강제하고 ② status.sync.revision이 이번에 push한
      # 커밋과 정확히 일치할 때만 수렴으로 인정한다.
      - name: Wait for ArgoCD convergence
        if: steps.services.outputs.list != '' || steps.services.outputs.k8s_changed == 'true' || steps.ctx.outputs.fe_sha != ''
        env:
          TARGET_REV: ${{ steps.pin.outputs.revision }}
        run: |
          kubectl -n argocd annotate application openat argocd.argoproj.io/refresh=hard --overwrite
          for i in $(seq 1 120); do   # 최대 10분
            REV=$(kubectl -n argocd get application openat -o jsonpath='{.status.sync.revision}' 2>/dev/null || echo "?")
            S=$(kubectl -n argocd get application openat \
                -o jsonpath='{.status.sync.status}/{.status.health.status}' 2>/dev/null || echo "?")
            if [ "$REV" = "$TARGET_REV" ] && [ "$S" = "Synced/Healthy" ]; then
              echo "ArgoCD converged at $REV."; exit 0
            fi
            echo "waiting... (rev=$REV, want=$TARGET_REV, status=$S)"; sleep 5
          done
          echo "ERROR: ArgoCD did not converge to $TARGET_REV in 600s (last rev=$REV status=$S)" >&2   # 실패는 시끄럽게
          kubectl -n argocd get application openat -o yaml | tail -40 >&2
          exit 1