name: Terraform Plan

# 인프라 형상관리(IaC) 파이프라인: terraform/** 를 바꾸는 PR에서 `terraform plan`을 돌려
# 결과를 PR 코멘트로 붙인다(사람이 diff 확인 후 머지). apply는 여기서 안 함(읽기 전용, 안전).
# tfplan은 이 잡 안에서만 잠깐 존재하고 커밋하지 않는다(형상관리는 .tf=git, state=S3).
#
# ── 현재 상태: 활성(2026-07-10 TF_CI_ENABLED=true, AWS_TF_ROLE_ARN 등록 완료) ──
# 선행 조건(키리스 인증, Q93 — 이미 충족됨):
#   1) AWS IAM에 GitHub OIDC provider 생성(token.actions.githubusercontent.com)
#      + terraform이 읽을 수 있는 Role(plan은 describe/get/list 읽기 권한이면 충분).
#   2) 리포 변수: TF_CI_ENABLED=true, AWS_TF_ROLE_ARN=<그 Role ARN>.
#   → 정적 AWS 키를 GitHub Secrets에 넣지 않는다(OIDC로 단명 자격만 발급).
on:
  pull_request:
    paths: ["terraform/**", "!terraform/github-repo/**"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # plan 결과 코멘트
  id-token: write        # OIDC 토큰 발급

jobs:
  plan:
    if: ${{ vars.TF_CI_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC, 키리스)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TF_ROLE_ARN }}
          aws-region: ap-northeast-2
          mask-aws-account-id: true

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        # 퍼블릭 리포 — plan raw 출력(속성값 전부 포함: 공인IP/버킷명/Role명/태그/
        # 각종 리소스ID)은 로그에도 파일에도 남기지 않는다. -out=tfplan으로 저장 후
        # terraform show -json에서 "리소스 주소 + 액션"만 뽑아 summary로 만든다.
        # attribute 값 자체가 안 들어가므로 정규식 마스킹(이전 시도, PR #109에서
        # igw-/rtb-/vpce-/버킷명/Role명/public_dns 누락으로 실패 확인)이 불필요해짐.
        run: |
          set +e
          terraform plan -input=false -no-color -lock-timeout=120s -out=tfplan > plan_raw.txt 2>&1
          PLAN_EXIT=$?
          set -e

          if [ "$PLAN_EXIT" -eq 0 ]; then
            terraform show -json tfplan > plan.json
            {
              echo "Plan 요약 (attribute 값은 보안상 미게시 — 상세 diff는 로컬 terraform plan으로 확인)"
              echo
              jq -r '
                .resource_changes[]
                | select(.change.actions != ["no-op"])
                | (if .change.actions == ["create"] then "+ "
                   elif .change.actions == ["delete"] then "- "
                   elif .change.actions == ["update"] then "~ "
                   else "± " end) + .address
              ' plan.json
              echo
              ADD=$(jq '[.resource_changes[] | select(.change.actions == ["create"])] | length' plan.json)
              CHANGE=$(jq '[.resource_changes[] | select(.change.actions == ["update"])] | length' plan.json)
              DESTROY=$(jq '[.resource_changes[] | select(.change.actions == ["delete"])] | length' plan.json)
              echo "Plan: ${ADD} to add, ${CHANGE} to change, ${DESTROY} to destroy."
            } > plan_summary.txt
          else
            echo "Terraform plan 실패(exit ${PLAN_EXIT}). 보안상 상세 출력은 로그에 남기지 않음 — 로컬에서 terraform plan으로 직접 확인." > plan_summary.txt
          fi

          cat plan_summary.txt
          rm -f plan_raw.txt tfplan plan.json
          exit "${PLAN_EXIT}"
        continue-on-error: true

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_summary.txt', 'utf8').slice(-60000);
            const body = `#### Terraform Plan \`${{ steps.plan.outcome }}\`\n<details><summary>plan 펼치기</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1
