# 호스트에서 직접 ./gradlew :apigateway:bootRun으로 띄울 때 쓰는 프로필.
# member 등 다운스트림 서비스도 같은 호스트에서 bootRun으로 떠 있다고 가정하고 localhost로 호출한다.
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9100/oauth2/jwks
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # swagger 문서 경로는 모든 모듈이 "/api-docs", "/swagger-ui.html"을 똑같이 쓰는
            # 컨벤션이라 prefix로 모듈을 구분해야 함 (StripPrefix로 떼고 전달).
            - id: member-docs
              uri: http://localhost:9100
              predicates:
                - Path=/member/api-docs,/member/swagger-ui.html,/member/swagger-ui/**
              filters:
                - StripPrefix=1
            # 실제 비즈니스 API는 도메인별 경로(/api/v1/members/**)가 이미 모듈마다 겹치지 않으므로
            # prefix 없이 실제 컨트롤러 경로 그대로 호출 가능.
            - id: member
              uri: http://localhost:9100
              predicates:
                - Path=/api/v1/members/**,/oauth2/jwks
            - id: product
              uri: http://localhost:9110
              predicates:
                - Path=/product/**
              filters:
                - StripPrefix=1
            - id: order
              uri: http://localhost:9120
              predicates:
                - Path=/order/**
              filters:
                - StripPrefix=1
            - id: payment
              uri: http://localhost:9130
              predicates:
                - Path=/payment/**
              filters:
                - StripPrefix=1
            - id: settlement
              uri: http://localhost:9140
              predicates:
                - Path=/settlement/**
              filters:
                - StripPrefix=1
