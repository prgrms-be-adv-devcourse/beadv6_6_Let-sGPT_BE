# 호스트에서 직접 ./gradlew :apigateway:bootRun으로 띄울 때 쓰는 프로필.
# member 등 다운스트림 서비스도 같은 호스트에서 bootRun으로 떠 있다고 가정하고 localhost로 호출한다.
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9100/oauth2/jwks
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: member
              uri: http://localhost:9100
              predicates:
                - Path=/member/**
              filters:
                - StripPrefix=1
            - id: product
              uri: http://localhost:9110
              predicates:
                - Path=/product/**
              filters:
                - StripPrefix=1
            - id: order
              uri: http://localhost:9120
              predicates:
                - Path=/order/**
              filters:
                - StripPrefix=1
            - id: payment
              uri: http://localhost:9130
              predicates:
                - Path=/payment/**
              filters:
                - StripPrefix=1
            - id: settlement
              uri: http://localhost:9140
              predicates:
                - Path=/settlement/**
              filters:
                - StripPrefix=1
