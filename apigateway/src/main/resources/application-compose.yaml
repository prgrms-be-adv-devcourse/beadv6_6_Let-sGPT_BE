# docker-compose 네트워크 안에서 띄울 때 쓰는 프로필. 다운스트림 서비스를 컨테이너 서비스명으로 호출한다.
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://member:9100/auth/jwks
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: member-docs
              uri: http://member:9100
              predicates:
                - Path=/member/api-docs,/member/swagger-ui.html,/member/swagger-ui/**
              filters:
                - StripPrefix=1
            - id: member
              uri: http://member:9100
              predicates:
                - Path=/api/v1/members/**,/api/v1/seller/**,/auth/jwks
            - id: search-api
              uri: http://search:9240
              predicates:
                - Path=/api/v1/searchs/**
            - id: product-api
              uri: http://product:9110
              predicates:
                - Path=/api/v1/products/**
            - id: product
              uri: http://product:9110
              predicates:
                - Path=/product/**
              filters:
                - StripPrefix=1
            - id: search
              uri: http://search:9240
              predicates:
                - Path=/search/**
              filters:
                - StripPrefix=1
            - id: order-api
              uri: http://order:9120
              predicates:
                - Path=/api/v1/orders/**
            - id: order
              uri: http://order:9120
              predicates:
                - Path=/order/**
              filters:
                - StripPrefix=1
            - id: payments-api
              uri: http://payment:9130
              predicates:
                - Path=/api/v1/payments/**
            - id: wallet-api
              uri: http://payment:9130
              predicates:
                - Path=/api/v1/wallet/**
            - id: refunds-api
              uri: http://payment:9130
              predicates:
                - Path=/api/v1/refunds/**
            - id: payment
              uri: http://payment:9130
              predicates:
                - Path=/payment/**
              filters:
                - StripPrefix=1
            - id: settlement-api
              uri: http://settlement:9140
              predicates:
                - Path=/api/v1/settlements/**
            - id: settlement
              uri: http://settlement:9140
              predicates:
                - Path=/settlement/**
              filters:
                - StripPrefix=1

openapi:
  aggregate:
    services:
      member-service: http://member:9100/api-docs
      product-service: http://product:9110/api-docs
      search-service: http://search:9240/api-docs
      order-service: http://order:9120/api-docs
      payment-service: http://payment:9130/api-docs
      settlement-service: http://settlement:9140/api-docs
    prefixes:
      payment-service: /payment
