server:
  port: 8000

spring:
  profiles:
    active: local
  application:
    name: apigateway

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls-primary-name: all-services
    persist-authorization: true
    urls:
      - name: all-services
        url: /v3/api-docs/all
      - name: member-service
        url: /member/api-docs
      - name: product-service
        url: /product/api-docs
      - name: search-service
        url: /search/api-docs
      - name: order-service
        url: /order/api-docs
      - name: payment-service
        url: /payment/api-docs
      - name: settlement-service
        url: /settlement/api-docs
      - name: ai-service
        url: /ai/api-docs


# k8s readiness/liveness probe + Prometheus 메트릭 노출 (전 프로필 공통)
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true   # k8s 밖(local/compose)에서도 /actuator/health/readiness·liveness 활성화
  tracing:
    export:
      otlp:
        enabled: false   # 로컬/compose 기본 off — Tempo 없으면 export 실패가 반복 로깅됨(k8s ConfigMap에서 true로 override)
