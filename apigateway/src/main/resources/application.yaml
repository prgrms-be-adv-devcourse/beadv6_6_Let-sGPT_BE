server:
  port: 8000

spring:
  profiles:
    active: local
  application:
    name: apigateway

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls-primary-name: all-services
    persist-authorization: true
    urls:
      - name: all-services
        url: /v3/api-docs/all
      - name: member-service
        url: /member/api-docs
      - name: product-service
        url: /product/api-docs
      - name: search-service
        url: /search/api-docs
      - name: order-service
        url: /order/api-docs
      - name: payment-service
        url: /payment/api-docs
      - name: settlement-service
        url: /settlement/api-docs
