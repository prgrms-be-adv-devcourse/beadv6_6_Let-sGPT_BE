server:
  port: 8000

spring:
  application:
    name: apigateway
  security:
    oauth2:
      resourceserver:
        jwt:
          # localhost → member-service 컨테이너 서비스명
          jwk-set-uri: http://member:9100/oauth2/jwks
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: member
              uri: http://member:9100
              predicates:
                - Path=/member/**
              filters:
                - StripPrefix=1
            - id: product
              uri: http://product:9110
              predicates:
                - Path=/product/**
              filters:
                - StripPrefix=1
            - id: order
              uri: http://order:9120
              predicates:
                - Path=/order/**
              filters:
                - StripPrefix=1
            - id: payment
              uri: http://payment:9130
              predicates:
                - Path=/payment/**
              filters:
                - StripPrefix=1
            - id: settlement
              uri: http://settlement:9140
              predicates:
                - Path=/settlement/**
              filters:
                - StripPrefix=1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: member-service
        url: /member-service/v3/api-docs