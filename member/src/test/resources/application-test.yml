spring:
  jpa:
    hibernate:
      # application.yml 기본값(validate)을 테스트 전용 create-drop으로 교체.
      # TestContainers PostgreSQL은 빈 DB이므로 Hibernate가 스키마를 직접 생성해야 기동됨.
      ddl-auto: create-drop
    properties:
      hibernate:
        hbm2ddl:
          # member.* 테이블이 member 스키마 아래에 존재하므로 스키마 자동 생성 필요.
          create_namespaces: true
  sql:
    init:
      mode: always
      data-locations: classpath:sql/init-data.sql
  # KafkaProducerConfig가 @Value("${spring.kafka.bootstrap-servers}")로 주입받는 필수 프로퍼티.
  # DefaultKafkaProducerFactory는 지연 연결이라 브로커가 실제로 떠 있지 않아도 컨텍스트 기동에는
  # 문제가 없다(OutboxPublisher가 PENDING 행이 없으면 send를 시도하지 않음). 실제 Kafka 검증이
  # 필요해지면 Testcontainers Kafka로 교체.
  kafka:
    bootstrap-servers: localhost:9092
