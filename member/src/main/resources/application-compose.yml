spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}                       # GitHub Secrets → 환경변수
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

openapi:
  gateway-url: http://localhost:8000              # 브라우저에서 게이트웨이로 접근하는 외부 주소

services:
  order:
    url: http://order:9120
  product:
    url: http://product:9110
  payment:
    url: http://payment:9130
  settlement:
    url: http://settlement:9140
