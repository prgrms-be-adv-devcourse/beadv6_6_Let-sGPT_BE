server:
  port: 9100

# IntelliJ/Gradle bootRun 둘 다 작업 디렉토리가 모듈 폴더(member/)라
# 한 단계 위(repo 루트)의 .env를 가리켜야 ${DB_USER} 같은 placeholder가 풀린다.
springdotenv:
  directory: ..

spring:
  profiles:
    active: local
  application:
    name: member-service
  jpa:
    properties:
      hibernate:
        default_schema: member # 스키마 분리
    hibernate:
      ddl-auto: validate
    # SQL init 스크립트가 Hibernate DDL 이후에 실행되도록 보장.
    # (로컬 local 프로필에서 sql.init.mode=always 사용 시 필수)
    defer-datasource-initialization: true
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# RSA 키페어는 local/compose 어디서든 동일해야 apigateway의 JWKS 캐시와 어긋나지 않으므로
# 프로필별로 나누지 않고 공통 설정에 둔다. 값은 .env(JWT_PRIVATE_KEY/JWT_PUBLIC_KEY)에서 주입.
jwt:
  key-id: ${JWT_KEY_ID}
  private-key: ${JWT_PRIVATE_KEY}
  public-key: ${JWT_PUBLIC_KEY}
  access-token-expire-seconds: 1800       # 30분
  refresh-token-expire-seconds: 1209600   # 14일
  issuer: ${JWT_ISSUER:http://localhost:9100}
  scoped-token-expire-seconds: 120        # RFC 8693 scoped 토큰 단명(2분)

# 찜 변경 이벤트(생성/삭제) — 아웃박스가 발행, order가 소비.
# 판매자 스토어명 변경 이벤트(등록/수정) — 아웃박스가 발행, product가 소비해 로컬 SellerStore 프로젝션을 채운다.
# 토픽 문자열은 product의 product.kafka.topic.seller-registered/seller-updated 값과 반드시 동일해야 한다.
member:
  kafka:
    topic:
      wishlist-changed: wishlist.changed.events
      seller-registered: seller_registered_events
      seller-updated: seller_updated_events

# k8s readiness/liveness probe + Prometheus 메트릭 노출 (전 프로필 공통)
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true   # k8s 밖(local/compose)에서도 /actuator/health/readiness·liveness 활성화
  tracing:
    export:
      otlp:
        enabled: false   # 로컬/compose 기본 off — Tempo 없으면 export 실패가 반복 로깅됨(k8s ConfigMap에서 true로 override)
