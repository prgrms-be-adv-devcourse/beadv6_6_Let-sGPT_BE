server:
  port: 9100

# IntelliJ/Gradle bootRun 둘 다 작업 디렉토리가 모듈 폴더(member/)라
# 한 단계 위(repo 루트)의 .env를 가리켜야 ${DB_USER} 같은 placeholder가 풀린다.
springdotenv:
  directory: ..

spring:
  profiles:
    active: local
  application:
    name: member-service
  jpa:
    properties:
      hibernate:
        default_schema: member # 스키마 분리
    hibernate:
      ddl-auto: validate
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# RSA 키페어는 local/compose 어디서든 동일해야 apigateway의 JWKS 캐시와 어긋나지 않으므로
# 프로필별로 나누지 않고 공통 설정에 둔다. 값은 .env(JWT_PRIVATE_KEY/JWT_PUBLIC_KEY)에서 주입.
jwt:
  key-id: ${JWT_KEY_ID}
  private-key: ${JWT_PRIVATE_KEY}
  public-key: ${JWT_PUBLIC_KEY}
  access-token-expire-seconds: 1800       # 30분
  refresh-token-expire-seconds: 1209600   # 14일