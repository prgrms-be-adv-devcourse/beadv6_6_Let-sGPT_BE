spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/openat   # 로컬 도커 DB
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # 로컬 개발 전용 override. 아직 member/seller_info 테이블 DDL이 없어서
      # validate(application.yml 기본값)로는 기동 자체가 안 됨 — 로컬은 매번 기동 시
      # 엔티티 기준으로 테이블을 새로 만들고 종료 시 드롭(create-drop)해서 깨끗하게 초기화.
      # compose/운영 프로필은 validate를 그대로 유지.
      ddl-auto: create-drop
  data:
    redis:
      host: localhost                              # 로컬 도커 redis
      port: 6379

services:
  order:
    url: http://localhost:9120                     # 타모듈 localhost
  product:
    url: http://localhost:9110
  payment:
    url: http://localhost:9130
  settlement:
    url: http://localhost:9140
