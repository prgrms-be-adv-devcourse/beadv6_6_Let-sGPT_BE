<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="360" viewBox="0 0 1440 360" role="img" aria-labelledby="title desc">
  <title id="title">관리자 챗봇의 고정 레벨 질문 구조</title>
  <desc id="desc">질문에서 영역 조합을 선택하고 선택한 스키마만 채운 뒤 허용된 요청을 실행하여 자연어로 답변하는 흐름</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#555555"/>
    </marker>
    <style>
      .text {
        font-family: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
        font-size: 23px;
        font-weight: 400;
        fill: #222222;
        text-anchor: middle;
      }
      .main { font-weight: 500; }
      .note {
        font-size: 18px;
        fill: #6A6A6A;
      }
      .line {
        fill: none;
        stroke: #777777;
        stroke-width: 2;
        marker-end: url(#arrow);
      }
      .answer-line {
        fill: none;
        stroke: #444444;
        stroke-width: 2;
        marker-end: url(#arrow);
      }
      .dot {
        fill: #FFFFFF;
        stroke: #333333;
        stroke-width: 2;
      }
      .selected {
        fill: #333333;
        stroke: #333333;
        stroke-width: 2;
      }
    </style>
  </defs>

  <rect width="1440" height="360" fill="#FFFFFF"/>

  <circle class="dot" cx="150" cy="132" r="9"/>
  <circle class="selected" cx="500" cy="132" r="9"/>
  <circle class="dot" cx="850" cy="132" r="9"/>
  <circle class="dot" cx="1200" cy="132" r="9"/>

  <path class="line" d="M171 132 H467"/>
  <path class="line" d="M521 132 H817"/>
  <path class="line" d="M871 132 H1167"/>

  <text class="text main" x="150" y="78">질문</text>
  <text class="text main" x="500" y="78">영역 조합</text>
  <text class="text main" x="850" y="78">구조 채우기</text>
  <text class="text main" x="1200" y="78">검증 · 실행</text>

  <text class="text note" x="500" y="178">일반 · 운영 · 외부 · 내부</text>
  <text class="text note" x="850" y="178">선택한 스키마만</text>
  <text class="text note" x="1200" y="178">허용된 요청만</text>

  <path class="answer-line" d="M1200 206 V258 H200"/>
  <text class="text main" x="390" y="310">결과 + 원 질문 → 자연어 답변</text>
</svg>
