spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/openat
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  kafka:
    bootstrap-servers: localhost:29092
  data:
    redis:
      host: localhost
      port: 6379

chat:
  data:
    bootstrap:
      enabled: ${CHAT_DATA_BOOTSTRAP_ENABLED:true}
      retry-delay: ${CHAT_DATA_BOOTSTRAP_RETRY_DELAY:15s}
