server:
  port: 9160

spring:
  profiles:
    active: local
  application:
    name: ai-service
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ai
        format_sql: false
        show_sql: false
        jdbc:
          time_zone: Asia/Seoul

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# k8s probe + Prometheus 메트릭
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true   # k8s 밖에서도 readiness/liveness 활성화
  tracing:
    export:
      otlp:
        enabled: false   # 로컬 기본 off (k8s ConfigMap에서 true로 override)

services:
  internal:
    timeout: ${INTERNAL_API_TIMEOUT:2000ms}
  order:
    url: ${ORDER_SERVICE_URL:http://localhost:9120}
  member:
    url: ${MEMBER_SERVICE_URL:http://localhost:9100}
  product:
    url: ${PRODUCT_SERVICE_URL:http://localhost:9110}
  search:
    url: ${SEARCH_SERVICE_URL:http://localhost:9240}
    timeout: ${SEARCH_SERVICE_TIMEOUT:2500ms}
    recommendation-size: ${SEARCH_RECOMMENDATION_SIZE:20}

inference:
  base-url: ${INFERENCE_BASE_URL:https://api.inferway.xyz/v1}
  timeout: ${INFERENCE_LLM_TIMEOUT:5000ms}
