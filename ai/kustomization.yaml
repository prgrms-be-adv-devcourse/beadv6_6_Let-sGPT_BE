# AI read-model 배포 artifact는 이 모듈이 단독 소유한다.
# 자기 디렉터리를 kustomize root로 삼아 DDL과 적용 스크립트를 복제 없이 ConfigMap으로 만든다.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - k8s/read-model-job.yaml

configMapGenerator:
  - name: ai-read-model-artifacts
    files:
      - scripts/apply-read-model.sh
      - src/main/resources/db/read-model/01-ai-read-model.sql
      - src/main/resources/db/read-model/verify-ai-read-model.sql
