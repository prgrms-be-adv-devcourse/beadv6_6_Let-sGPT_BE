server:
  port: 8761

spring:
  application:
    name: discovery-service

# Standalone Eureka server: it must not register with or fetch from itself
eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
