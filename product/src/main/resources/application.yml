server:
  port: 9110
  tomcat:
    mbeanregistry:
      enabled: true   # tomcat_threads_* 메트릭(Micrometer TomcatMetrics) 노출에 필요


spring:
  profiles:
    active: local
  application:
    name: product-service
  jpa:
    properties:
      hibernate:
        default_schema: product # 스키마 분리
        default_batch_fetch_size: 100 # LAZY 연관 N+1 안전망(IN 배치 로딩)
    hibernate:
      ddl-auto: update # 부팅 간 재고 이력 보존(콜드부팅 복구 검증) — create는 매 기동 원장 삭제
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  kafka:
    consumer:
      group-id: product-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

drop:
  warm-before: 5m # 오픈 전 캐시 워밍 선행 시간
  close-margin: 10m # 종료 후 캐시 TTL 여유 (결제 마진)
  null-close-ttl: 7d # closeAt 미지정 드롭의 기본 캐시 TTL
  idempotency-ttl: 1h # order 멱등키 TTL

product:
  image:
    s3:
      bucket: ${PRODUCT_IMAGE_S3_BUCKET} # 이미지 객체를 저장하는 단일 버킷
      staging-prefix: ${PRODUCT_IMAGE_S3_STAGING_PREFIX} # 브라우저가 presigned PUT으로 업로드하는 임시 prefix
      final-prefix: ${PRODUCT_IMAGE_S3_FINAL_PREFIX} # 상품에 연결된 이미지를 저장하는 최종 prefix
      presign-expiry: 10m # 브라우저 업로드 서명 유효시간
      max-upload-size: 5MB # promote 시 HeadObject 크기 게이트
      endpoint-override: ${PRODUCT_IMAGE_S3_ENDPOINT:} # 값이 있으면 S3 호환 스토리지, 비면 실제 AWS
      public-endpoint-override: ${PRODUCT_IMAGE_S3_PUBLIC_ENDPOINT:} # presigned URL용 공개 endpoint, 비면 기존 endpoint
      access-key: ${PRODUCT_IMAGE_S3_ACCESS_KEY:} # endpoint-override 사용 시에만
      secret-key: ${PRODUCT_IMAGE_S3_SECRET_KEY:}
  kafka:
    topic:
      product-created: product.created.events
      product-updated: product.updated.events
      product-deleted: product.deleted.events
      # member 발행 스토어 이벤트 소비(SellerStore 표시명 투영). 발행 측 토픽명은 member 와 합의 필요.
      seller-registered: seller_registered_events
      seller-updated: seller_updated_events


# k8s readiness/liveness probe + Prometheus 메트릭 노출 (전 프로필 공통)
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true   # k8s 밖(local/compose)에서도 /actuator/health/readiness·liveness 활성화
  tracing:
    export:
      otlp:
        enabled: false   # 로컬/compose 기본 off — Tempo 없으면 export 실패가 반복 로깅됨(k8s ConfigMap에서 true로 override)
