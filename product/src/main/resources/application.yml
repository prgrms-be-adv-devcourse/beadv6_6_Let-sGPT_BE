server:
  port: 9110


spring:
  profiles:
    active: local
  application:
    name: product-service
  jpa:
    properties:
      hibernate:
        default_schema: product # 스키마 분리
        default_batch_fetch_size: 100 # LAZY 연관 N+1 안전망(IN 배치 로딩)
    hibernate:
      ddl-auto: update # 부팅 간 재고 이력 보존(콜드부팅 복구 검증) — create는 매 기동 원장 삭제
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  kafka:
    consumer:
      group-id: product-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

drop:
  warm-before: 5m # 오픈 전 캐시 워밍 선행 시간
  close-margin: 10m # 종료 후 캐시 TTL 여유 (결제 마진)
  null-close-ttl: 7d # closeAt 미지정 드롭의 기본 캐시 TTL
  idempotency-ttl: 1h # order 멱등키 TTL

product:
  image:
    local-dir: ${PRODUCT_IMAGE_DIR:${user.home}/.openat/product-images} # 부팅 서버 로컬 저장 (TODO final: AWS S3 전환)
  batch-import:
    max-rows: ${PRODUCT_BATCH_IMPORT_MAX_ROWS:1000}
    max-manifest-bytes: ${PRODUCT_BATCH_IMPORT_MAX_MANIFEST_BYTES:5242880}
    max-image-bytes: ${PRODUCT_BATCH_IMPORT_MAX_IMAGE_BYTES:10485760}
    worker-threads: ${PRODUCT_BATCH_IMPORT_WORKER_THREADS:2}
    local-allowed-roots: ${PRODUCT_BATCH_IMPORT_LOCAL_ALLOWED_ROOTS:${user.home}/.openat/product-imports}
    s3-allowed-buckets: ${PRODUCT_BATCH_IMPORT_S3_ALLOWED_BUCKETS:}
    s3-region: ${PRODUCT_BATCH_IMPORT_S3_REGION:ap-northeast-2}
  kafka:
    topic:
      product-created: product.created.events
      product-updated: product.updated.events
      product-deleted: product.deleted.events
      # member 발행 스토어 이벤트 소비(SellerStore 표시명 투영). 발행 측 토픽명은 member 와 합의 필요.
      seller-registered: seller_registered_events
      seller-updated: seller_updated_events


# k8s readiness/liveness probe + Prometheus 메트릭 노출 (전 프로필 공통)
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true   # k8s 밖(local/compose)에서도 /actuator/health/readiness·liveness 활성화
  tracing:
    export:
      otlp:
        enabled: false   # 로컬/compose 기본 off — Tempo 없으면 export 실패가 반복 로깅됨(k8s ConfigMap에서 true로 override)
