server:
  port: 9110


spring:
  profiles:
    active: local
  application:
    name: product-service
  jpa:
    properties:
      hibernate:
        default_schema: product # 스키마 분리
        default_batch_fetch_size: 100 # LAZY 연관 N+1 안전망(IN 배치 로딩)
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
