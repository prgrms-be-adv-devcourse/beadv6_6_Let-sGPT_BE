spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/openat   # 로컬 도커 DB
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  kafka:
    # local-kafka의 INTERNAL 리스너(kafka:9092)는 도커 네트워크 내부에서만 resolve됨 — 호스트에서 직접 뜨는
    # local 프로필은 EXTERNAL 리스너(localhost:29092, docker-compose.yml)로 붙어야 함.
    bootstrap-servers: localhost:29092
  data:
    redis:
      host: localhost
      port: 6379

product:
  image:
    s3:
      bucket: openat-images
      staging-prefix: images/staging/
      final-prefix: images/final/
      endpoint-override: http://localhost:9000
      access-key: ${MINIO_ROOT_USER:minioadmin}
      secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}

services:
  member:
    url: http://localhost:9100                     # 타모듈 localhost
  order:
    url: http://localhost:9120
  payment:
    url: http://localhost:9130
  settlement:
    url: http://localhost:9140
